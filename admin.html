<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script>if (!sessionStorage.getItem('adminAuth')) { location.replace('index.html'); }</script>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>管理者ページ — スペイン語学習ポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1c1e; --mid: #48484a; --muted: #8e8e93;
    --accent: #2a5298; --accent2: #1b7a68;
    --bg: #f5f5f0; --surface: #ffffff;
    --rule: #d6d6ce; --head-bg: #ebeff8;
    --serif: 'Noto Serif JP', serif; --sans: 'Noto Sans JP', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans); font-size: 14px; line-height: 1.8;
    color: var(--ink); background: var(--bg);
    max-width: 700px; margin: 0 auto; padding: 32px 22px 80px;
  }
  header {
    border-top: 3px solid var(--accent); border-bottom: 1px solid var(--rule);
    padding: 20px 0 16px; margin-bottom: 32px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  header h1 {
    font-family: var(--serif); font-size: 22px; font-weight: 700; color: var(--accent);
  }
  .logout-btn {
    font-size: 12px; color: var(--muted); background: none;
    border: 1px solid var(--rule); border-radius: 4px; padding: 6px 14px;
    cursor: pointer; font-family: var(--sans); flex-shrink: 0; transition: all .15s;
  }
  .logout-btn:hover { border-color: var(--muted); color: var(--mid); }
  .section {
    background: var(--surface); border: 1px solid var(--rule);
    border-radius: 8px; margin-bottom: 24px; overflow: hidden;
  }
  .section-header {
    background: var(--head-bg); padding: 14px 20px; border-bottom: 1px solid var(--rule);
  }
  .section-header h2 {
    font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--accent);
  }
  .ext-link-row {
    display: flex; align-items: center; gap: 14px;
    padding: 15px 20px; text-decoration: none; color: inherit;
    border-bottom: 1px solid var(--rule); transition: background .15s;
  }
  .ext-link-row:last-child { border-bottom: none; }
  .ext-link-row:hover { background: var(--head-bg); }
  .ext-link-icon { font-size: 22px; flex-shrink: 0; }
  .ext-link-text { flex: 1; min-width: 0; }
  .ext-link-label { font-size: 14px; color: var(--ink); font-weight: 500; }
  .ext-link-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .ext-link-arrow { font-size: 16px; color: var(--muted); flex-shrink: 0; }
  .action-btn {
    width: 100%; border: none; border-radius: 6px; padding: 12px;
    font-family: var(--sans); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background .15s;
  }
  .action-btn.primary   { background: var(--accent);  color: #fff; }
  .action-btn.primary:hover { background: #1d3d7a; }
  .action-btn.secondary { background: var(--accent2); color: #fff; }
  .action-btn.secondary:hover { background: #155f51; }
  .field-label { font-size: 12px; color: var(--mid); display: block; margin-bottom: 4px; }
  .field-input {
    width: 100%; border: 1.5px solid var(--rule); border-radius: 4px;
    padding: 9px 12px; font-size: 14px; outline: none; font-family: var(--sans);
    margin-bottom: 10px;
  }
  .field-input:focus { border-color: var(--accent); }
  @media (max-width: 540px) {
    body { padding: 16px 14px 60px; }
    header h1 { font-size: 18px; }
  }
</style>
</head>
<body>
<header>
  <h1>🔧 管理者ページ</h1>
  <div style="display:flex; gap:8px; align-items:center;">
    <a href="index.html" class="logout-btn" style="text-decoration:none;">← ホーム</a>
    <button class="logout-btn" onclick="adminLogout()">ログアウト</button>
  </div>
</header>

<!-- アクセス制御 -->
<div class="section">
  <div class="section-header">
    <h2>アクセス制御</h2>
  </div>
  <div style="padding: 16px 20px;">
    <p style="font-size: 13px; color: var(--mid); margin-bottom: 14px; line-height: 1.7;">
      有効にすると所属に関係なくすべてのコンテンツを表示します。<br>
      パスワード変更後は自動的に解除されます。
    </p>
    <button class="action-btn primary" onclick="enableViewAll()">すべてのページを確認する</button>
  </div>
</div>

<!-- パスワード変更 -->
<div class="section">
  <div class="section-header">
    <h2>パスワード変更</h2>
  </div>
  <div style="padding: 16px 20px;">
    <label class="field-label">現在のパスワード</label>
    <input id="pw-current" type="password" maxlength="20" class="field-input" autocomplete="current-password">
    <label class="field-label">新しいパスワード</label>
    <input id="pw-new" type="password" maxlength="20" class="field-input" autocomplete="new-password">
    <label class="field-label">新しいパスワード（確認）</label>
    <input id="pw-confirm" type="password" maxlength="20" class="field-input" autocomplete="new-password" style="margin-bottom: 14px;">
    <button id="pw-btn" class="action-btn secondary" onclick="changePassword()">パスワードを変更する</button>
    <div id="pw-msg" style="font-size: 12px; margin-top: 10px; min-height: 16px;"></div>
  </div>
</div>

<!-- 外部ツール -->
<div class="section">
  <div class="section-header">
    <h2>外部ツール</h2>
  </div>
  <div style="padding: 8px 0;">
    <a href="https://developers.google.com/analytics?hl=ja" target="_blank" rel="noopener noreferrer" class="ext-link-row">
      <div class="ext-link-icon">📊</div>
      <div class="ext-link-text">
        <div class="ext-link-label">Webページの閲覧状況を確認する</div>
        <div class="ext-link-sub">Google Analytics</div>
      </div>
      <div class="ext-link-arrow">↗</div>
    </a>
    <a href="https://adsense.google.com/intl/ja_jp/start/" target="_blank" rel="noopener noreferrer" class="ext-link-row">
      <div class="ext-link-icon">💰</div>
      <div class="ext-link-text">
        <div class="ext-link-label">広告を管理する</div>
        <div class="ext-link-sub">Google AdSense</div>
      </div>
      <div class="ext-link-arrow">↗</div>
    </a>
    <a href="https://docs.google.com/forms" target="_blank" rel="noopener noreferrer" class="ext-link-row">
      <div class="ext-link-icon">📋</div>
      <div class="ext-link-text">
        <div class="ext-link-label">科類調査</div>
        <div class="ext-link-sub">Google Forms</div>
      </div>
      <div class="ext-link-arrow">↗</div>
    </a>
    <a href="https://docs.google.com/forms" target="_blank" rel="noopener noreferrer" class="ext-link-row">
      <div class="ext-link-icon">✉️</div>
      <div class="ext-link-text">
        <div class="ext-link-label">問い合わせ</div>
        <div class="ext-link-sub">Google Forms</div>
      </div>
      <div class="ext-link-arrow">↗</div>
    </a>
  </div>
</div>

<script>
var ADMIN_SALT = 'sp_portal_salt_2026';
var ADMIN_ITER = 200000;
var ADMIN_DEFAULT_HASH = '0c877d3c605d890781da58d6892bc153342a7a2783432dc2b2b604336e7b914f';

function getAdminHash() {
  return localStorage.getItem('adminHashOverride') || ADMIN_DEFAULT_HASH;
}

function adminLogout() {
  sessionStorage.removeItem('adminAuth');
  window.location.replace('index.html');
}

function enableViewAll() {
  localStorage.setItem('adminViewAll', 'true');
  window.location.href = 'index.html';
}

async function changePassword() {
  var msgEl = document.getElementById('pw-msg');
  var btn   = document.getElementById('pw-btn');
  var currentPw = document.getElementById('pw-current').value;
  var newPw     = document.getElementById('pw-new').value;
  var confirmPw = document.getElementById('pw-confirm').value;

  msgEl.style.color = '#a8281a';
  if (!currentPw || !newPw || !confirmPw) {
    msgEl.textContent = 'すべての項目を入力してください。';
    return;
  }
  if (newPw !== confirmPw) {
    msgEl.textContent = '新しいパスワードが一致しません。';
    return;
  }
  if (newPw.length < 4) {
    msgEl.textContent = 'パスワードは4文字以上にしてください。';
    return;
  }

  btn.disabled = true;
  btn.textContent = '確認中…';

  var enc = new TextEncoder();

  var km1 = await crypto.subtle.importKey('raw', enc.encode(currentPw), 'PBKDF2', false, ['deriveBits']);
  var b1  = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt: enc.encode(ADMIN_SALT), iterations: ADMIN_ITER, hash: 'SHA-256' }, km1, 256);
  var currentHash = Array.from(new Uint8Array(b1)).map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');

  if (currentHash !== getAdminHash()) {
    btn.disabled = false;
    btn.textContent = 'パスワードを変更する';
    msgEl.textContent = '現在のパスワードが正しくありません。';
    return;
  }

  var km2 = await crypto.subtle.importKey('raw', enc.encode(newPw), 'PBKDF2', false, ['deriveBits']);
  var b2  = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt: enc.encode(ADMIN_SALT), iterations: ADMIN_ITER, hash: 'SHA-256' }, km2, 256);
  var newHash = Array.from(new Uint8Array(b2)).map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');

  localStorage.setItem('adminHashOverride', newHash);
  localStorage.removeItem('adminViewAll');

  btn.disabled = false;
  btn.textContent = 'パスワードを変更する';
  msgEl.style.color = '#1b7a68';
  msgEl.textContent = 'パスワードを変更しました。次回ログインから有効です。';

  document.getElementById('pw-current').value = '';
  document.getElementById('pw-new').value     = '';
  document.getElementById('pw-confirm').value = '';
}
</script>
</body>
</html>
