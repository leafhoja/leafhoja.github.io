"], ["resignadamente", "副詞", "諦めて、甘んじて、文句を言わずに（英語の resignedly に相当）", "", "", "", "", "", "容詞 resignado の副詞形。逆らうことを完全に放棄し、トホホという気持ちや悟りの境地で事態を受け入れる様子を表現するインフラ副詞です。"], ["resignado", "形容詞（過去分詞）", "諦め顔の、甘んじている（※resignadaの男性形）", "", "", "", "", "resignado, resignada, resignados, resignadas", ""], ["resignar", "動詞", "（再帰動詞で）**諦める、甘んじる、受け入れる**、(他動詞・古い表現)（職を）辞する、委ねる（英語の resign oneself, accept に相当）", "", "", "resigno, resignas, resigna, resignamos, resignáis, resignan", "ar動詞（規則変化）", "", "語の resign（辞職する）のイメージが強いですが、**スペイン語で最も重要なのは常に再帰形（resignarse）の「諦める、受け入れる」という意味です**。   ** resignarse a + 名詞/動詞原形 ** の構文で「**（自分の力ではどうしようもないから）〜と諦めて腹をくくる、甘んじて受け入れる**」という、大人の心理表現に絶対欠かせないキラー動詞です（例: Tienes que resignarte a la realidad / 現実を受け入れなくてはならない）。"], ["resina", "名詞", "樹脂、松やに、レジン、合成樹脂（英語の resin に相当）", "f", "resinas", "", "", "", "*工業・DIY・アートの必須素材名詞**。松などの木から分泌される天然の「松やに・天然樹脂」のほか、現代の3Dプリンターやハンドメイドのアクセサリー作りで大活躍する「レジン（**resina sintética / 合成樹脂**）」を指す超身近な実務ワードです。"], ["resinosa / resinoso", "形容詞", "樹脂を含んだ、樹脂の、松やにの混ざった（英語の resinous に相当）", "", "", "", "", "resinoso, resinosa, resinosos, resinosas", "礎データの整合性保持のため女性形で配置。植物学や木材加工において、松などの「樹脂を多く含む木（madera resinosa）」を分類・解説する際の実務・専門形容詞です。"], ["resinoso", "形容詞", "樹脂を含んだ（※resinosaの男性形）", "", "", "", "", "resinoso, resinosa, resinosos, resinosas", ""], ["resistencia", "名詞", "**抵抗、反抗、耐久性、耐性、(電気)抵抗器、(スポーツ)スタミナ・持久力**、(歴史)レジスタンス（英語の resistance, endurance, stamina に相当）", "f", "resistencias", "", "", "", "*あらゆる分野で最前線を張る超重要多義名詞**。   1. **ビジネス・工業**: 製品のキズや熱に対する「耐久性（**resistencia al calor** / 耐熱性）」。   2. **スポーツ・健康**: 筋トレやランニングで必要な「**スタミナ、持久力、タフさ**」。   3. **医学**: 抗生物質などが効かなくなる「薬剤耐性（resistencia a los antibióticos）」。   4. **政治・社会**: 権力に対する「抵抗運動（oponer resistencia / 抵抗する）」。"], ["resistente", "形容詞", "**耐久性のある、タフな、〜に強い、耐性のある、頑丈な**（英語の resistant, durable, tough に相当）", "", "", "", "", "resistente, resistente, resistentes, resistentes", "女同形（複数形は resistentes）。**製品スペックや素材を語る上での絶対必須形容詞**。   「 **resistente a + 名詞** 」の形で「**〜に強い、〜耐性のある**」という最強の実務フレーズを量産します（例: **resistente al agua** / 防水の、水に強い、 *resistente a los golpes* / 耐衝撃の、頑丈な）。"], ["resistible", "形容詞", "抵抗できる、我慢できる、耐えられる（英語の resistible に相当）", "", "", "", "", "resistible, resistible, resistibles, resistibles", "女同形（複数形は resistibles）。「耐えられない・不可抗力な（irresistible）」の対義語。自分の意志の力や物理的な盾で「十分に抗うことができる、防ぎきれる」事象を形容する際に使われます。"], ["resistidero", "名詞", "（※主にスペインの地方語）夏の最も暑い時間帯、ひどい酷暑（＝canícula）", "m", "resistideros", "", "", "", "差しがあまりに強烈で、じっと耐える（resistir）ことしかできないような「夏の真っ昼間のジリジリとした猛暑」をユーモラスに指す伝統的な口語表現です。"], ["resistir", "動詞", "**耐える、持ちこたえる、抵抗する、我慢する**、(誘惑などを)拒む、(再帰動詞で)嫌がる、抵抗する（英語の resist, endure, stand に相当）", "", "", "resisto, resistes, resiste, resistimos, resistís, resisten", "ir動詞（規則変化）", "", "*日常会話からビジネス、軍事ニュースまでトップクラスに君臨する超重要必須動詞**。   1. **物理・耐久**: この素材は高温に「耐える（Resistir altas temperaturas）」。   2. **心理・日常**: 苦境やストレスに「持ちこたえる、耐え抜く」。また、否定文で **No resisto más** と言うと**「もう限界だ、これ以上我慢できない」**という超頻出フレーズになります。   3. **誘惑**: *Resistir la tentación*（誘惑に耐える、打ち勝つ）。"], ["resistón / resistona", "形容詞", "（※口語）頑固な、なかなか言うことを聞かない、非常に辛抱強い", "", "", "", "", "resistón, resistona, resistones, resistonas", "み事をしても「いやだ」と頑なに拒んだり、簡単にはへこたれないタフでちょっと手強いキャラクターを指す口語的な形容詞です。"], ["resma", "名詞", "（紙の単位）連（れん）、紙500枚（英語の ream に相当）", "f", "resmas", "", "", "", "*オフィス実務・印刷・文具業界の必須単位ワード**。プリンター用紙やコピー用紙の束（一般的に500枚）を数える際の業界標準単位です（例: una resma de papel A4 / A4コピー用紙1連）。"], ["resobrar", "動詞", "（※やや古い表現）極めて大量に余る、売るほど残る（＝sobrar en demasía）", "", "", "resobro, resobras, resobra, resobramos, resobráis, resobran", "ar動詞（規則変化）", "", "詞 sobrar（余る）の強調形。必要量を遥かに超えて、使い道に困るほどモノが余り散らかしている状態を指します。"], ["resol", "名詞", "照り返し、反射光、強烈な日差し（英語の glare, reflection of the sun に相当）", "m", "resoles", "", "", "", "陽そのものの光だけでなく、白い壁や地面に反射して目が眩むような「ジリジリとした強い照り返し」をピンポイントで指す気象・日常名詞です。"], ["resoplada / resoplado", "名詞・形容詞（過去分詞）", "（名詞として）鼻を鳴らすこと、激しいため息、（形容詞として）ふうふう息を荒くした", "f", "resopladas", "", "", "", "礎データの整合性保持のため女性形で配置。怒りや疲れ、あきれた気持ちから「フンッ！」「はぁ〜あ」と激しく鼻や口から息を吹き出す行為を指します。"], ["resoplar", "動詞", "（鼻や口から）プンプン息を吹く、ふうふう息を荒くする、(あきれて)大きなため息をつく、(馬などが)鼻を鳴らす（英語の snort, puff, pant に相当）", "", "", "resoplo, resoplas, resopla, resoplamos, resopláis, resoplan", "ar動詞（規則変化）", "", "*人間の感情や状態をリアルに描写する重要動詞**。   1. **疲労・運動**: 重い荷物を運んだり階段を上ったりして「ゼーゼー・ふうふうと荒い息をつく」。   2. **心理**: 相手のあまりの理不尽さに、思わず「**（あきれたり怒ったりして）ふんと鼻を鳴らす、大きいため息をつく**」という、小説や日常のリアルなジェスチャーを表します。"], ["resoplido", "名詞", "（鼻や口からの）荒い息、大きなため息、鼻鳴らし（英語の snort, puff に相当）", "m", "resoplidos", "", "", "", "詞 resoplar の名詞形。不満げな「フンッ」という鼻息や、疲労困憊したときの「ふうっ」というリアルな息の音そのものを指します。"], ["resolana", "名詞", "（雲に遮られた）薄日、日差しの照り返し、日当たりの良い場所（英語の sun glare に相当）", "f", "resolanas", "", "", "", "っているのに紫外線が強くてジリジリするような「独特のまぶしい光（薄日）」を指す言葉です。中南米では、日差しを遮る場所がない風通しの悪い暑い場所を指すこともあります。"], ["resolar", "動詞", "（靴の）ソール（靴底）を張り替える、修理する", "", "", "resuelo, resuelas, resuela, resolamos, resoláis, resuelan", "ar動詞（不規則変化：o->ue型）", "", "* nosotros, vosotros 以外で o が ue に変化する語根変化動詞です**。お気に入りの革靴やスニーカーを長く履くために、磨り減った「靴底（suela）を新しいものに交換して修理する」職人・DIYの実務動詞です。"], ["resoluble", "形容詞", "解決可能な、(数学)解くことができる、(化学)分解できる（英語の resolvable, soluble に相当）", "", "", "", "", "resoluble, resoluble, resolubles, resolubles", "女同形（複数形は resolubles）。トラブルや数式、課題が、適切なアプローチによって「十分に解決に導くことができる性質であること」を論理的に説明する形容詞です（対義語は irresoluble）。"], ["resolución", "名詞", "**解決、決議、決定、(カメラ等の)解像度、決断力、(法律)判決・処分**（英語の resolution, decision, settlement に相当）", "f", "resoluciones", "", "", "", "数形になると ó のアクセント記号が消えます。**ビジネス・IT・国際ニュースの最高峰に君臨する多義名詞**。   1. **ビジネス・政治**: 問題の「**解決（resolución de problemas）**」や、国連などの「**決議（resolución de la ONU）**」。   2. **IT・ガジェット**: 画面や写真の「**解像度（alta resolución / 高解像度・高画質）**」。   3. **マインド**: 新年の抱負や固い決意（propósito / resolución）。"], ["resolutiva / resolutivo", "形容詞", "決断力のある、課題解決能力の高い、(法律)解除条件の、(医学)消散させる（英語の resolute, decisive に相当）", "", "", "", "", "resolutivo, resolutiva, resolutivos, resolutivas", "礎データの整合性保持のため女性形で配置。**モダンビジネスの最強の誉め言葉・人材形容詞**。グダグダ悩まずに現場のトラブルをスパッと処理できる「**実行力・圧倒的な課題解決力があるリーダーや社員**」をスマートに形容する必須ワードです（例: un gerente muy resolutivo / 非常に手際がよく決断力のあるマネージャー）。"], ["resolutivo", "形容詞", "決断力のある、課題解決能力の高い（※resolutivaの男性形）", "", "", "", "", "resolutivo, resolutiva, resolutivos, res // ====== アクセント正規化 ======

                  'ó':'o','\xf3':'o','ú':'u','\xfa':'u','\xfc':'u','\xf1':'n',

var INDEX = [];

// ====== ファジー距離 ======
function levenshtein(a, b) {
  if (Math.abs(a.length - b.length) > 3) return 999;
  var m = a.length, n = b.length;
  var dp = [];
  for (var i = 0; i <= m; i++) {
    dp[i] = [i];
    for (var j = 1; j <= n; j++) dp[i][j] = 0;
  }
  for (var j2 = 0; j2 <= n; j2++) dp[0][j2] = j2;
  for (var i2 = 1; i2 <= m; i2++) {
    for (var j3 = 1; j3 <= n; j3++) {
      if (a[i2-1] === b[j3-1]) dp[i2][j3] = dp[i2-1][j3-1];
      else dp[i2][j3] = 1 + Math.min(dp[i2-1][j3], dp[i2][j3-1], dp[i2-1][j3-1]);

  var detailRows = '';
  if (pos) detailRows += '<div class="detail-label">品詞</div><div class="detail-value">' + escHtml(pos) + '</div>';
  if (plural) detailRows += '<div class="detail-label">複数形</div><div class="detail-value" style="font-family:var(--mono);font-weight:600">' + escHtml(plural) + '</div>';
  if (vtype) detailRows += '<div class="detail-label">動詞型</div><div class="detail-value">' + escHtml(vtype) + '</div>';
  if (conj) {
    var cItems = conj.split(/,\s*/).map(function(f) { return '<span class="conj-item">' + escHtml(f.trim()) + '</span>'; }).join('');
    detailRows += '<div class="detail-label">現在活用</div><div class="detail-value"><div class="conj-list">' + cItems + '</div></div>';
  }
  if (adj) {
    var aItems = adj.split(/,\s*/).map(function(f) { return '<span class="adj-item">' + escHtml(f.trim()) + '</span>'; }).join('');
    detailRows += '<div class="detail-label">形容詞変化</div><div class="detail-value"><div class="conj-list">' + aItems + '</div></div>';
  }
  var noteHtml = note ? '<div class="note-box">📝 ' + escHtml(note) + '</div>' : '';
  var exHtml = '';
  if (typeof DICT_EXAMPLES !== 'undefined' && DICT_EXAMPLES[word]) {
    var ex = DICT_EXAMPLES[word];
    exHtml = '<div class="example-block">' +
      '<div class="example-label">例文</div>' +
      '<div class="example-es">' + escHtml(ex.es) + '</div>' +
      '<div class="example-ja">' + escHtml(ex.ja) + '</div>' +
      '</div>';
  }
  var triviaText = (typeof DICT_TRIVIA !== 'undefined' && DICT_TRIVIA[word]) ? DICT_TRIVIA[word] : '';
  if (triviaText) {
    exHtml += '<div class="trivia-box">💡 ' + escHtml(triviaText) + '</div>';
  }
  var posBadge = escHtml(pos.split('・')[0].split('（')[0]);
  return '<div class="entry-card" id="card-' + idx + '">' +
    '<div class="card-header" onclick="toggleCard(' + idx + ')">' +
      '<div class="word-block">' +
        '<span class="word-es">' + highlightedWord + '</span>' +
        '<span class="word-ja">' + escHtml(meaning) + '</span>' +
      '</div>' +
      '<div class="card-right">' +
        '<span class="pos-badge ' + posClass + '">' + posBadge + '</span>' +
        genderHtml +
        '<span class="toggle-icon">▼</span>' +
      '</div>' +
    '</div>' +
    '<div class="card-detail">' +
      '<div class="detail-grid">' + detailRows + '</div>' +
      noteHtml +
      exHtml +
    '</div>' +
  '</div>';
}

function toggleCard(idx) {
  var card = document.getElementById('card-' + idx);
  if (card) card.classList.toggle('open');
}

function renderResults(indices, query) {
  var container = document.getElementById('results');
  var toShow = indices.slice(0, PAGE_SIZE);
  var html = '';
  for (var i = 0; i < toShow.length; i++) html += renderEntry(toShow[i], query);
  container.innerHTML = html;
  displayedCount = toShow.length;
  document.getElementById('loadMoreBtn').style.display = indices.length > PAGE_SIZE ? 'block' : 'none';
}

function loadMore() {
  var query = document.getElementById('searchInput').value;
  var container = document.getElementById('results');
  var nextBatch = currentResults.slice(displayedCount, displayedCount + PAGE_SIZE);
  var html = '';
  for (var i = 0; i < nextBatch.length; i++) html += renderEntry(nextBatch[i], query);
  container.innerHTML += html;
  displayedCount += nextBatch.length;
  if (displayedCount >= currentResults.length) document.getElementById('loadMoreBtn').style.display = 'none';
}

function showWelcome() {
  document.getElementById('results').innerHTML =
    '<div class="welcome">' +
      '<div class="welcome-icon">📖</div>' +
      '<h2>スペイン語辞書へようこそ</h2>' +
      '<p>日本語・スペイン語、どちらでも検索できます。</p>' +
      '<div class="tips">' +
        '<div class="tip"><div class="tip-title"><span class="tip-icon">🇪🇸</span> スペイン語で検索</div><div>活用形からも検索できます（例: hablo → hablar）</div></div>' +
        '<div class="tip"><div class="tip-title"><span class="tip-icon">🇯🇵</span> 日本語で検索</div><div>意味のキーワードを入力（例: 話す、家）</div></div>' +
        '<div class="tip"><div class="tip-title"><span class="tip-icon">✏️</span> アクセント省略OK</div><div>accion でも acción を見つけます</div></div>' +
        '<div class="tip"><div class="tip-title"><span class="tip-icon">🔤</span> 綴りミスに寛容</div><div>多少のタイポも予測して候補を表示します</div></div>' +
      '</div>' +
    '</div>';
  document.getElementById('loadMoreBtn').style.display = 'none';
}

function updateStats(count, total, query) {
  var el = document.getElementById('statsText');
  if (!query) { el.innerHTML = '全 <strong>' + total.toLocaleString() + '</strong> 語収録'; }
  else if (count === 0) { el.innerHTML = '0件 — 別のキーワードをお試しください'; }
  else { el.innerHTML = '<strong>' + count.toLocaleString() + '</strong> 件の結果'; }
}

// ====== 入力ハンドラ ======
var debounceTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(debounceTimer);
  var self = this;
  debounceTimer = setTimeout(function() {
    var q = self.value.trim();
    if (!q) { showWelcome(); updateStats(0, RAW.length, ''); return; }
    currentResults = search(q);
    renderResults(currentResults, q);
    updateStats(currentResults.length, RAW.length, q);
    if (currentResults.length === 0) {
      document.getElementById('results').innerHTML =
        '<div class="no-results"><h3>見つかりませんでした</h3>' +
        '<p>「' + escHtml(q) + '」に一致する語がありません。<br>別のキーワードや表記をお試しください。</p></div>';
    }
  }, 200);
});

function setLang(mode) {
  langMode = mode;
  var btns = document.querySelectorAll('.lang-btn');
  for (var b = 0; b < btns.length; b++) btns[b].classList.remove('active');
  var activeBtn = document.getElementById('btn' + mode.charAt(0).toUpperCase() + mode.slice(1));
  if (activeBtn) activeBtn.classList.add('active');
  var q = document.getElementById('searchInput').value.trim();
  if (q) { currentResults = search(q); renderResults(currentResults, q); updateStats(currentResults.length, RAW.length, q); }
}

function toggleFilter(pos) {
  var chips = document.querySelectorAll('.chip');
  var idx = activeFilters.indexOf(pos);
  if (idx >= 0) {
    activeFilters.splice(idx, 1);
    for (var c = 0; c < chips.length; c++) { if (chips[c].textContent === pos) chips[c].classList.remove('active'); }
  } else {
    activeFilters.push(pos);
    for (var c2 = 0; c2 < chips.length; c2++) { if (chips[c2].textContent === pos) chips[c2].classList.add('active'); }
  }
  var q = document.getElementById('searchInput').value.trim();
  if (q) { currentResults = search(q); renderResults(currentResults, q); updateStats(currentResults.length, RAW.length, q); }
}

// 初期化
showWelcome();
updateStats(0, RAW.length, '');

</script>
</body>
</html>
