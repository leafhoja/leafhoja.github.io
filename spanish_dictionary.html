<!DOCTYPE html>
<html lang="ja">
<head>


<script src="access-control.js"></script>
<script src="ga.js"></script>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src https://www.google-analytics.com https://stats.g.doubleclick.net;">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スペイン語辞書</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
  :root {
    --ink:#1c1c1e; --mid:#48484a; --muted:#8e8e93;
    --accent:#2a5298; --accent2:#1b7a68; --warn:#a8281a;
    --gold:#6b5418; --bg:#f5f5f0; --surface:#ffffff;
    --rule:#d6d6ce; --head-bg:#ebeff8; --alt-bg:#f0f0eb;
    --ex-bg:#ecf3fa; --tip-bg:#eef6ee; --rd:#6b4f9e; --rd-head:#ede8f5;
    --serif:'Noto Serif JP',serif; --sans:'Noto Sans JP',sans-serif;
    --mono:'IBM Plex Mono',monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:var(--sans); font-size:14px; line-height:1.8; color:var(--ink); background:var(--bg); }

  #top-nav {
    position:sticky; top:0; z-index:900;
    background:var(--surface); border-bottom:2px solid var(--accent);
    display:flex; align-items:center; gap:8px;
    padding:6px 16px; box-shadow:0 2px 8px rgba(0,0,0,.10);
  }
  #nav-home {
    background:var(--accent2); color:#fff; border:none;
    border-radius:3px; padding:5px 12px; font-size:12px; font-weight:700;
    cursor:pointer; font-family:var(--sans); text-decoration:none;
    transition:background .12s; white-space:nowrap; display:inline-flex; align-items:center;
  }
  #nav-home:hover { background:#155f50; }
  #nav-title { font-family:var(--serif); font-size:13px; font-weight:700; color:var(--accent); flex:1; }
  #nav-count { font-size:11px; color:var(--muted); }

  .search-section { background:var(--head-bg); border-bottom:1px solid var(--rule); padding:14px 20px; }
  .search-section-inner { max-width:860px; margin:0 auto; }
  .search-wrap { display:flex; gap:8px; align-items:stretch; }
  .search-box { position:relative; flex:1; }
  .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); opacity:.45; pointer-events:none; font-size:14px; }
  #searchInput {
    width:100%; padding:9px 12px 9px 36px;
    border:1px solid var(--rule); border-radius:3px;
    background:var(--surface); color:var(--ink);
    font-family:var(--mono); font-size:14px; outline:none; transition:border-color .12s;
  }
  #searchInput:focus { border-color:var(--accent); }
  #searchInput::placeholder { color:var(--muted); font-family:var(--sans); font-size:13px; }
  .lang-toggle { display:flex; border:1px solid var(--rule); border-radius:3px; overflow:hidden; }
  .lang-btn {
    padding:8px 14px; border:none; background:transparent; color:var(--muted);
    cursor:pointer; font-family:var(--sans); font-size:12px; font-weight:700; transition:all .15s; white-space:nowrap;
  }
  .lang-btn.active { background:var(--accent); color:#fff; }
  .lang-btn:hover:not(.active) { background:var(--head-bg); color:var(--accent); }

  main { max-width:860px; margin:0 auto; padding:14px 20px 60px; }
  .stats-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:7px 0; margin-bottom:12px; font-size:12.5px; color:var(--muted);
    border-bottom:1px solid var(--rule); flex-wrap:wrap; gap:8px;
  }
  .stats-bar strong { color:var(--ink); font-weight:700; }
  .filter-chips { display:flex; gap:5px; flex-wrap:wrap; }
  .chip {
    padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700;
    cursor:pointer; border:1.5px solid var(--rule);
    background:transparent; color:var(--muted); transition:all .15s; font-family:var(--sans);
  }
  .chip:hover { border-color:var(--accent); color:var(--accent); }
  .chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  .entry-card {
    background:var(--surface); border:1px solid var(--rule);
    border-radius:6px; margin-bottom:7px; overflow:hidden; transition:box-shadow .15s;
  }
  .entry-card:hover { box-shadow:0 2px 10px rgba(0,0,0,.08); }
  .card-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 14px; cursor:pointer; gap:12px; transition:background .1s;
  }
  .card-header:hover { background:var(--head-bg); }
  .entry-card.open .card-header { background:var(--head-bg); border-bottom:1px solid var(--rule); }
  .word-block { display:flex; align-items:baseline; gap:12px; flex:1; min-width:0; }
  .word-es { font-family:var(--mono); font-size:15px; font-weight:700; color:var(--accent); flex-shrink:0; }
  .word-es mark { background:#fff3a0; color:var(--ink); border-radius:2px; padding:0 1px; }
  .word-ja { font-size:13px; color:var(--mid); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .pos-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:3px; white-space:nowrap; }
  .pos-名詞   { background:var(--head-bg); color:var(--accent); }
  .pos-動詞   { background:#e4f0ec;        color:var(--accent2); }
  .pos-形容詞 { background:var(--rd-head); color:var(--rd); }
  .pos-副詞   { background:#fff8ec;        color:var(--gold); }
  .pos-other  { background:var(--alt-bg);  color:var(--muted); }
  .gender-tag { font-size:10px; font-weight:700; padding:2px 5px; border-radius:3px; }
  .gender-m { background:var(--head-bg); color:var(--accent); }
  .gender-f { background:#fdecea;        color:var(--warn); }
  .toggle-icon { font-size:10px; color:var(--muted); transition:transform .2s; }
  .entry-card.open .toggle-icon { transform:rotate(180deg); }

  .card-detail { display:none; padding:11px 14px; }
  .entry-card.open .card-detail { display:block; }
  .detail-grid { display:grid; grid-template-columns:90px 1fr; gap:6px 10px; font-size:13px; align-items:baseline; }
  .detail-label {
    font-size:10px; font-weight:700; color:var(--muted);
    background:var(--alt-bg); padding:2px 6px; text-align:center; align-self:start; margin-top:2px;
  }
  .detail-value { color:var(--ink); line-height:1.75; }
  .conj-list { display:flex; flex-wrap:wrap; gap:4px; }
  .conj-item { font-family:var(--mono); font-size:12px; color:var(--accent2); background:var(--ex-bg); padding:1px 7px; border-radius:2px; }
  .adj-item  { font-family:var(--mono); font-size:12px; color:var(--rd);      background:var(--rd-head); padding:1px 7px; border-radius:2px; }
  .note-box { margin-top:9px; padding:7px 10px; background:var(--tip-bg); border-left:3px solid #6bab6b; border-radius:0 4px 4px 0; font-size:12px; color:var(--gold); line-height:1.6; }
  .trivia-box { margin-top:7px; padding:7px 10px; background:#fef8ec; border-left:3px solid #c9941a; border-radius:0 4px 4px 0; font-size:12px; color:#6b4818; line-height:1.6; }
  .example-block { margin-top:10px; padding-top:10px; border-top:1px solid var(--rule); }
  .example-label { font-size:10px; font-weight:700; color:var(--muted); background:var(--alt-bg); padding:2px 6px; border-radius:2px; display:inline-block; margin-bottom:5px; }
  .example-es { font-family:var(--mono); font-size:13px; color:var(--accent2); line-height:1.8; }
  .example-ja { font-size:12px; color:var(--mid); line-height:1.7; margin-top:2px; }
  mark { background:#fff3a0; color:var(--ink); border-radius:2px; padding:0 1px; }

  .welcome { text-align:center; padding:56px 20px; }
  .welcome-icon { font-size:52px; margin-bottom:14px; }
  .welcome h2 { font-family:var(--serif); font-size:20px; color:var(--accent); margin-bottom:8px; }
  .welcome p { color:var(--muted); font-size:13px; max-width:380px; margin:0 auto 18px; }
  .tips { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:10px; max-width:700px; margin:0 auto; text-align:left; }
  .tip { background:var(--surface); border:1px solid var(--rule); border-radius:6px; padding:11px 13px; font-size:12.5px; }
  .tip-title { font-weight:700; font-size:12.5px; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
  .tip-icon { font-size:14px; }
  .no-results { text-align:center; padding:48px 20px; color:var(--muted); }
  .no-results h3 { font-family:var(--serif); font-size:18px; margin-bottom:8px; color:var(--ink); }

  #loadMoreBtn {
    display:block; margin:18px auto 0; padding:8px 28px;
    background:transparent; border:1.5px solid var(--rule);
    border-radius:20px; color:var(--muted); font-family:var(--sans);
    font-size:13px; font-weight:700; cursor:pointer; transition:all .2s;
  }
  #loadMoreBtn:hover { border-color:var(--accent); color:var(--accent); }

  @media (max-width:580px) {
    .search-wrap { flex-wrap:wrap; }
    #searchInput { font-size:16px; }
    .word-ja { font-size:11px; }
    .detail-grid { grid-template-columns:75px 1fr; }
  }
</style>

</head>
<body>

<div id="top-nav">
  <a id="nav-home" href="index.html">🏠 ホーム</a>
  <span id="nav-title">🇪🇸 スペイン語辞書</span>
  
</div>

<div class="search-section">
  <div class="search-section-inner">
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="日本語 or Español で検索… (例: hablar / 話す / hablo)" autocomplete="off" spellcheck="false">
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnBoth" onclick="setLang('both')">全て</button>
        <button class="lang-btn" id="btnEs" onclick="setLang('es')">ES</button>
        <button class="lang-btn" id="btnJa" onclick="setLang('ja')">JP</button>
      </div>
    </div>
  </div>
</div>

<main>
  <div class="stats-bar">
    <span id="statsText">検索キーワードを入力してください</span>
    <div class="filter-chips" id="filterChips">
      <button class="chip" onclick="toggleFilter('名詞')">名詞</button>
      <button class="chip" onclick="toggleFilter('動詞')">動詞</button>
      <button class="chip" onclick="toggleFilter('形容詞')">形容詞</button>
      <button class="chip" onclick="toggleFilter('副詞')">副詞</button>
    </div>
  </div>

  <div id="results"></div>
  <button id="loadMoreBtn" style="display:none" onclick="loadMore()">さらに表示する</button>
</main>

", "名詞", "旗、軍旗、規格、象徴", "m", "estandartes", "", "", "", "見出し語データの整合性保持（アルファベット順例外）のためここに配置。組織や運動の「シンボル・旗印」という意味でもよく使われます。"], ["portar", "動詞", "運ぶ、持参する、携帯する（武器などを）", "", "", "porto, portas, porta, portamos, portáis, portan", "ar動詞（規則変化）", "", "常の「運ぶ」は llevar や traer を使いますが、許可証や武器を「携帯する」、あるいは再帰動詞 **portarse** の形で「振る舞う、行動する」という意味で日常的に超頻出します（例: ¡Pórtate bien! / お行儀よくしなさい！、Se portó muy mal / 彼はとても態度が悪かった）。"], ["portavoz", "名詞", "スポークスマン、報道官、代弁者（英語の spokesman, spokesperson に相当）", "m / f", "portavoces", "", "", "", "*男女同形**（el portavoz / la portavoz）。語尾が z のため、複数形は z が c に変わり es がつきます（portavoces）。政府や企業の「公式発表を行う担当者」を指す重要ニュース単語です。"], ["porte", "名詞", "運賃、送料、身のこなし、風格、容姿（英語の carriage, bearing に相当）", "m", "portes", "", "", "", "ortes pagados で「送料込み（元払い）」、portes debidos で「着払い」。また、人の「上品な佇まい・身のこなし（buen porte）」を褒める際にも使われます。"], ["portero", "名詞", "門番、アパートの管理人・ドアマン、（サッカーなどの）ゴールキーパー（英語の goalkeeper, doorman に相当）", "m", "porteros", "", "", "", "性の場合は la portera。スポーツ（サッカーやハンドボールなど）の「ゴールキーパー」を指す最も一般的な単語です（中南米では arquero や guardameta とも言います）。"], ["portezuela", "名詞", "（自動車や飛行機などの）ドア、小さな門", "f", "portezuelas", "", "", "", "uerta（ドア）に縮小辞がついた形。特に「乗り物のドア」を指す際に使われる名詞です。"], ["pórtico", "名詞", "ポーチ、柱廊、玄関（特に神殿や教会の壮大な建築物）", "m", "pórticos", "", "", "", "初の o に必ずアクセント記号がつきます。"], ["portón", "名詞", "大門、大きな表扉、裏口の門、（車の）バックドア・ハッチバック", "m", "portones", "", "", "", "uerta（ドア）の増大辞。複数形になると ó のアクセント記号が消えます。工場の大きな門や、車の「トランクの跳ね上げ式ドア」などを指します。"], ["portugues / portugués", "形容詞・名詞", "ポルトガルの、ポルトガル人の、（名詞として）ポルトガル語", "m", "portugueses", "", "", "portugués, portuguesa, portugueses, portuguesas", "しい綴りは **portugués**（e にアクセント記号が必要）です。データ整合性のため無記号版もカバー。単数男性形はアクセントがありますが、女性形（portuguesa）や複数形（portugueses）になるとアクセント記号は消えます。"], ["porvenir", "名詞", "将来、未来（※重複語）", "m", "porvenires", "", "", "", "礎データ整合性維持のため配置。"], ["posa", "名詞", "休止、停止、（鐘の）葬送の鐘の合間、未決", "f", "posas", "", "", "", ""], ["posada", "名詞", "宿屋、旅籠（はたご）、宿泊、下宿（英語の inn に相当）", "f", "posadas", "", "", "", "史的な古い宿を指すことが多いですが、スペインでは伝統的な建物を改装した風情ある高級ホテル（Posada）としても残っています。メキシコなどではクリスマス んぶん）計算する、割り当てる（英語の prorate に相当）", "", "", "prorrateo, prorrateas, prorratea, prorrateamos, prorrateáis, prorratean", "ar動詞（規則変化）", "", "用や利益をメンバーの条件（人数や期間など）に応じて「按分して分ける」という実務的なビジネス動詞です。"], ["prorrateo", "名詞", "比例配分、按分計算、割り当て、プロラタ", "m", "prorrateos", "", "", "", ""], ["prórroga", "名詞", "（期限の）延長、猶予、猶予期間、（スポーツなどの）延長戦（英語の extension, overtime に相当）", "f", "prórrogas", "", "", "", "初の o に必ずアクセント記号がつきます。契約やビザの「期間延長（prórroga de contrato / visado）」のほか、サッカーなどの試合で同点の場合に行われる「延長戦（jugar la prórroga）」を指す超重要単語です。"], ["prorrogar", "動詞", "（期限を）延長する、引き延ばす（英語の extend, renew に相当）", "", "", "prorrogo, prorrogas, prorroga, prorrogamos, prorrogáis, prorrogan", "ar動詞（規則変化※綴り注意）", "", "過去（過去形）の1人称単数で **prorrogué** となり、g が gu に変化します（例: prorrogar el plazo / 期限を延長する）。"], ["prorrumpir", "動詞", "突然（大声などで）〜し出す、突発する、一斉に放つ", "", "", "prorumpo, prorrumpes, prorrumpe, prorrumpimos, prorrumpís, prorrumpen", "ir動詞（規則変化）", "", "に **prorrumpir en + 名詞** の形で、感情や声が激しく湧き出る様子を表現します（例: prorrumpir en llanto / 突然わっと泣き出す、prorrumpir en aplausos / 割れんばかりの拍手が湧き起こる）。"], ["prosa", "名詞", "散文、散文体（英語の prose に相当）", "f", "prosas", "", "", "", "（verso）の対義語。普通の文章スタイルを指します。"], ["prosaica", "形容詞（女性形）", "散文的な、退屈な、平凡な、俗っぽい（英語の prosaic に相当）", "", "", "", "", "prosaico, prosaica, prosaicos, prosaicas", "礎データの整合性保持のため女性形で配置。最初の a に必ずアクセント記号がつきます。高尚でなく、実利主義的で「夢や情緒がない、ありふれていてつまらない」というネガティブなニュアンスを含みます。"], ["prosaico", "形容詞", "散文的な、退屈な、俗っぽい（※prosaicaの男性形）", "", "", "", "", "prosaico, prosaica, prosaicos, prosaicas", ""], ["prosapia", "名詞", "家系、血統、門地、祖先（文語的な表現）", "f", "prosapias", "", "", "", "e ilustre prosapia で「名門の家系の出身で」。"], ["proscenio", "名詞", "プロセニアム、舞台の前部、エプロンステージ（演劇）", "m", "proscenios", "", "", "", ""], ["proscribir", "動詞", "禁止する、追放する、法総の対象にする（英語の proscribe, outlaw に相当）", "", "", "proscribo, proscribes, proscribe, proscribimos, proscribís, proscriben", "ir動詞（不規則変化・過去分詞のみ）", "", "在活用は規則変化ですが、**過去分詞が proscripto または proscrito という特殊な形をとる不規則動詞です**（中南米では proscripto、スペインでは proscrito が好まれる傾向にあります）。法律や社会で特定の行為や集団を「禁止・追放する」という硬い表現です。"], ["proscripción", "名詞", "追放、禁止、法外放置、褫奪（ちだつ）", "f", "proscripciones", "", "", "", "数形になると ó のアクセント記号が消えます。"], ["proscrito", "名詞・形容詞・動詞（過去分詞）", "追放された人、お尋ね者、無法者、（形容詞として）禁止された、追放された（英語の outlaw に相当）", "m", "proscritos", "", "", "proscrito, proscrita, proscritos, proscritas", "詞 proscribir の過去分詞。歴史やファンタジー、ニュースなどで「社会から締め出された存在、お尋ね者」を指します。"], ["prosecución", "名詞", "継続、続行、追究、遂行（英語の prosecution, pursuit に相当）", "f", "prosecuciones", "", "", "", "数形になると ó のアクセント記号が消えます。動詞 proseguir の名詞形。ビジネスや公的文書で、プロジェクトや目的の「継続・遂行」を表す硬い単語です。"], ["proseguir", "動詞", "続ける、続行する、再開する、進み続ける（英語の pursue, continue に相当）", "", "", "prosigo, prosigues, prosigue, proseguimos, proseguís, prosiguen", "ir動詞（不規則変化・語幹母音変化・綴り注意）", "", "*動詞 seguir と完全に同じ複雑な不規則変化をします**。1人称単数は **prosigo**、それ以外の nosotros, vosotros 以外は e が **i** に変わります（prosigues, prosigue, prosiguen）。また、現在分詞は **prosiguiendo**、点過去3人称は **prosiguió / prosiguieron** と、i 変化が継続する要注意最重要動詞です（例: proseguir el viaje / 旅を続ける）。"], ["prosélita", "名詞（女性形）", "改宗者、新しい（信者・政党などの）支持者・獲得された熱心な仲間", "f", "prosélitas", "", "", "", "礎データの整合性保持のため女性形で配置。最初の e に必ずアクセント記号がつきます（男性形: prosélito）。"], ["proselitismo", "名詞", "改宗勧誘、熱心な（宗教・政党などの）党員・支持者拡大活動、勧誘", "m", "proselitismos", "", "", "", "に宗教や政治組織が「自分の味方・信者を増やすために積極的に行う勧誘や宣伝活動」を指し、文脈によってはやや強引なニュアンスを含むことがあります。"], ["prosista", "名詞", "散文家、散文の作家", "m / f", "prosistas", "", "", "", "女同形（el prosista / la prosista）。"], ["prospecto", "名詞", "（医薬品の）説明書・添付文書、パンフレット、案内書、（ビジネスの）目論見書", "m", "prospectos", "", "", "", "語の prospect（見込み）とは日常的な意味が異なり、スペイン語圏の日常生活で **prospecto** と言えば、薬の箱の中に入っている**「（副作用や服用方法が書かれた）医薬品添付の説明書」**を指す超必須重要単語です。"], ["prosperar", "動詞", "繁栄する、栄える、成功する、（計画などが）承認される・進展する（英語の prosper, thrive に相当）", "", "", "prospero, prosperas, prospera, prosperamos, prosperáis, prosperan", "ar動詞（規則変化）", "", "ジネスや国家が「繁栄する」という意味のほか、議会や会議で「提案・法案が（否決されずに）無事に通る・成立する」という文脈でも非常によく使われます。"], ["prosperidad", "名詞", "繁栄、成功、幸運、富（英語の prosperity に相当）", "f", "prosperidades", "", "", "", "年の挨拶や祝辞などで Desear paz y prosperidad（平和と繁栄を祈る）のように使われる定番の上品な名詞です。"], ["próspera", "形容詞（女性形）", "繁栄している、好調な、豊かな（英語の prosperous に相当）", "", "", "", "", "próspero, próspera, prósperos, prósperas", "礎データの整合性保持のため女性形で配置。最初の o に必ずアクセント記号がつきます。 una economía próspera（繁栄している経済）。"], ["próspero", "形容詞", "繁栄している、豊かな（※prósperaの男性形）", "", "", "", "", "próspero, próspera, prósperos, prósperas", "初の o に必ずアクセント記号がつきます。年末年始の定番の挨拶フレーズである **¡Feliz y próspero Año Nuevo!**（幸せで実り多き新年を！）で誰もが耳にする超重要形容詞です。"], ["prostitución", "名詞", "売春、売笑、(能力などの)切り売り", "f", "prostituciones", "", "", "", "数形になると ó のアクセント記号が消えます。"], ["prostituta", "名詞", "売春婦、セックスワーカー（英語の prostitute に相当）", "f", "prostitutas", "", "", "", "り公的な表現や配慮した表現では trabajadora sexual（セックスワーカー）と言い換えられることも多いです。"], ["prostituyo / prostituir", "動詞", "売春させる、(名誉や才能を)卑しめる・切り売りする", "", "", "prostituyo, prostituyes, prostituye, prostituimos, prostituís, prostituyen", "ir動詞（不規則変化・綴り注意）", "", "出し語データ（prostituyo）は動詞 prostituir の直説法現在1人称単数形です。**語尾が -uir で終わる動詞の規則に従い、nosotros, vosotros 以外で i が y に変化します**。過去分詞は規則通り prostituido。再帰動詞 **prostituirse** で「売春する」の意。"], ["protagonista", "名詞", "主人公、主役、中心人物（英語の protagonist, main character に相当）", "m / f", "protagonistas", "", "", "", "尾が -a ですが**男女同形（el protagonista / la protagonista）**です。映画や小説の「主人公」だけでなく、ニュースで「（ある事件やプロジェクトの）中心人物・当事者」を指す際にも頻繁に使われます。"], ["protagonizar", "動詞", "主演する、主役を務める、（事件などの）中心となる・引き起こす（英語の star in, lead に相当）", "", "", "protagonizo, protagonizas, protagoniza, protagonizamos, protagonizáis, protagonizan", "ar動詞（規則変化※綴り注意）", "", "過去（過去形）の1人称単数で **protagonicé** となり、z が c に変化します。映画などで「〜が主演する（protagonizar una película）」という使い方のほか、時事ニュースで「（主語が）大騒動や歴史的事件の中心になる、引き起こす」という比喩表現でも頻出します。"], ["protección", "名詞", "保護、防護、庇護、プロテクション（英語の protection に相当）", "f", "protecciones", "", "", "", "数形になると ó のアクセント記号が消えます。 **protección de datos** で「データ保護（プライバシー保護）」という現代社会の最重要ワードになります。日焼け止めは crema de protección solar（または単に protector solar）と呼びます。"], ["proteccionismo", "名詞", "保護貿易主義（経済）", "m", "proteccionismos", "", "", "", "際経済や政治のニュースで自由貿易（libre comercio）の対義語として登場する重要ワードです。"], ["protector", "名詞・形容詞", "保護者、プロテクター、守護者、（形容詞として）保護する、防護用の（英語の protector, protective に相当）", "m", "protectores", "", "", "protector, protectora, protectores, protectoras", "性の保護者は la protectora。現代の日常生活では、スマートフォンの画面保護フィルムを **protector de pantalla** と呼ぶほか、日焼け止めを **protector solar** と呼ぶのが大定番です。"], ["protectorado", "名詞", "保護領、保護国、保護政治", "m", "protectorados", "", "", "", "史や国際政治のテキストで登場する専門用語です。"], ["proteger", "動詞", "保護する、守る、かばう（英語の protect に相当）", "", "", "protejo, proteges, protege, protegemos, protegéis, protegen", "er動詞（規則変化※綴り注意）", "", "*発音を維持するための綴り変化に強力な注意が必要な最重要動詞です**。1人称単数（yo）のみ、g が **j** に変化して **protejo** となります（それ以外は protege, protegen など g のまま）。過去分詞は規則通り **protegido**（例: proteger el medio ambiente / 環境を保護する）。"], ["proteica", "形容詞（女性形）", "タンパク質の、変幻自在な", "", "", "", "", "proteico, proteica, proteicos, proteicas", "礎データの整合性保持のため女性形で配置。日常的には生化学や栄養学の「タンパク質（の）」という意味で、文芸や比喩ではギリシャ神話のプロテウスに由来する「変幻自在な」という意味で使われます。"], ["proteína", "名詞", "タンパク質、プロテイン（英語の protein に相当）", "f", "proteínas", "", "", "", "に必ずアクセント記号がつきます。健康・食事の文脈や、筋トレの「プロテイン（batido de proteínas / プロテインシェイク）」を指す生活必須単語です。"], ["protesta", "名詞", "抗議、不満の表明、抗議デモ（英語の protest に相当）", "f", "protestas", "", "", "", "詞 protestar の名詞形。 una manifestación de protesta で「抗議デモ」。"], ["protestante", "名詞・形容詞", "プロテスタント（新教徒）、（形容詞として）プロテスタントの、抗議する", "m / f", "protestantes", "", "", "protestante, protestante, protestantes, protestantes", "女同形。宗教改革に端を発するキリスト教の「プロテスタント」を指す歴史・文化用語です。"], ["protestar", "動詞", "抗議する、不満を言う、主張する（英語の protest, complain に相当）", "", "", "protesto, protestas, protesta, protestamos, protestáis, protestan", "ar動詞（規則変化）", "", "*protestar por/contra + 名詞** で「〜に対して抗議する、文句を言う」（例: Protestaron por la subida de precios / 彼らは物価の上昇に対して不満を言った・抗議した）。"], ["protocolo", "名詞", "プロトコル、儀礼・規程、外交儀礼、（医療・実験などの）手順書、通信規約（IT）（英語の protocol に相当）", "m", "protocolos", "", "", "", "交や公式行事の「マナー・儀礼」という意味から発展し、現代ビジネスや医療現場では「標準的な業務手順・マニュアル（seguir el protocolo / 手順に従う）」という意味で極めて高い頻度で使われます。ITのインターネット通信プロトコル（例: HTTP）もこれです。"], ["prototipo", "名詞", "試作品、プロトタイプ、原型、典型（英語の prototype に相当）", "m", "prototipos", "", "", "", "造業やIT開発における「試作品」という意味のほか、ある性格やタイプの「典型・見本のような人」を指す際にも使われます。"], ["provecho", "名詞", "利益、メリット、成果、進歩、役立つこと（英語の profit, benefit に相当）", "m", "provechos", "", "", "", "*超重要生活フレーズの塊**。食事を始める人にかける **¡Buen provecho!** は「召し上がれ！（英語の Enjoy your meal! に相当）」という挨拶として毎日使われます。また、 **sacar provecho de...** で「〜から利益を得る、〜を（うまく）利用する・活用する」という重要熟語になります。"], ["provechoso", "形容詞", "有益な、役に立つ、実りのある（英語の profitable, beneficial に相当）", "", "", "", "", "provechoso, provechosa, provechosos, provechosas", "議や経験、読書などが「自分にとってプラスになった、有意義だった」と表現する際の上品な形容詞です（例: una experiencia provechosa / 有益な経験）。"], ["proveedor", "名詞", "供給業者、サプライヤー、仕入れ先、プロバイダー（英語の supplier, provider に相当）", "m", "proveedores", "", "", "", "性（または会社組織を la で受ける場合）は la proveedora。ビジネスの実務で「仕入れ先・サプライヤー（proveedor de servicios / サービスプロバイダー）」を指す必須単語です。"], ["proveer", "動詞", "供給する、提供する、備え付ける、(必要なものを)満たす（英語の provide, supply に相当）", "", "", "proveo, provees, provee, proveemos, proveéis, proveen", "er動詞（不規則変化・綴り注意）", "", "*極めて重要な綴り要注意動詞**。現在活用は規則的（eeが並ぶ）ですが、**現在分詞は proveyendo、点過去（過去形）の3人称は proveyó / proveyeron** となり、i が y に変化します。また、**過去分詞は proveído と provisto の2種類が存在し、どちらも正解**です（現代ビジネスでは provisto も非常によく使われます）。 **proveer de + 物** で「（人に）物を提供する・与える」という重要構文になります。"], ["proveído / proveído", "動詞（過去分詞）・名詞", "供給された、（名詞として、法律）裁定、命令、公式決定", "m", "proveídos", "", "", "", "詞 proveer の過去分詞形（規則側）。法律実務においては、裁判官が下す「（手続き上の）決定・命令」を指す名詞としても使われます。"], ["provento", "名詞", "収益、利得、（公的な）収入", "m", "proventos", "", "", "", "産や事業から得られる利益を指す、やや硬い経済・法律用語です。"], ["provenir", "動詞", "由来する、〜に起因する、〜から出る（英語の come from, stem from に相当）", "", "", "provengo, provienes, proviene, provenimos, provenís, provienen", "ir動詞（不規則変化）", "", "*動詞 venir（来る）の活用を完全に引き継ぐ最重要不規則動詞**。1人称単数（yo）は **provengo**、それ以外（nosotros, vosotros除く）は e が **ie** に変化します。点過去は provine、未来形は provendré。常に **provenir de + 名詞** の形で使い、「（商品・言葉・問題などが）〜から来ている、〜が出処である」という意味で日常・ニュースともに最頻出します（例: Esta palabra proviene del latín / この単語はラテン語に由来する）。"], ["provenza", "名詞（固有名詞）", "プロヴァンス（フランス南東部の歴史的地域名）", "f", "", "", "", "", "理・文化・歴史の文脈、または料理（hierbas de Provenza / プロヴァンスハーブ）などで登場します。"], ["proverbiador", "名詞", "ことわざ（諺）の収集家、ことわざを作る人", "m", "proverbiadores", "", "", "", ""], ["proverbio", "名詞", "ことわざ（諺）、格言（英語の proverb に相当）", "m", "proverbios", "", "", "", "間伝承の知恵が詰まった「ことわざ（＝refrán）」を指す、やや上品な表現です。聖書の「格言（箴言）」の書も Proverbios と呼ばれます。"], ["providencial", "形容詞", "神意の、奇跡的な、絶好のタイミングの、天佑の（英語の providential に相当）", "", "", "", "", "providencial, providencial, providenciales, providenciales", "女同形。単にラッキーというだけでなく、「まるで神の助け（摂理）があったかのような絶妙なタイミングの、奇跡的な救い」というニュアンスを含みます（例: una ayuda providencial / 奇跡的な助け）。"], ["provincia", "名詞", "省、県、地方、田舎（英語の province に相当）", "f", "provincias", "", "", "", "ペインの行政区画（Comunidad Autónoma＝自治州の下にある **Provincia＝県**。例: マドリード州マドリード県、アンダルシア州セビリア県など）を指す重要単語です。また、首都マドリードに対する「地方・田舎」という意味合いで *ir a provincias*（地方へ行く）のように使われることもあります。"], ["provincial", "形容詞", "省の、県の、地方の、視野の狭い（英語の provincial に相当）", "", "", "", "", "provincial, provincial, provinciales, provinciales", "女同形（複数形は provinciales）。行政としての「県の〜（gobierno provincial / 県政府）」という意味のほか、比喩的に「都会（首都）を知らない、視野が狭く垢抜けない」という意味で使われることがあります。"], ["provisión", "名詞", "供給、支給、備蓄、(複数形で)食料・必需品、(会計)引当金・準備金（英語の provision に相当）", "f", "provisiones", "", "", "", "数形になると ó のアクセント記号が消えます。単数では必要なものを手配する「供給」ですが、**複数形の *las provisiones* になると、災害時や旅行のために蓄える「食料品・備蓄品・マウンテンギア（＝víveres）」**の意味になり、生活必須ワードになります。会計用語の「引当金（provisión de fondos）」としても重要です。"], ["provisional", "形容詞", "一時的な、仮の、暫定的な（英語の provisional, temporary に相当）", "", "", "", "", "provisional, provisional, provisionales, provisionales", "女同形（複数形は provisionales）。対義語は definitivo（最終的な、確定の）。ビジネスやニュースで「暫定予算（presupuesto provisional）」や「仮免・仮の許可（permiso provisional）」などの文脈で非常によく使われます。"], ["provisionalmente", "副詞", "一時的に、暫定的に、仮に（英語の provisionally, temporarily に相当）", "", "", "", "", "", "容詞 provisional の副詞形。のちに正式決定されるまでの間「とりあえず仮にこうしておく」という場面のオフィスワークで多用されます。"], ["provisto", "動詞（過去分詞）・形容詞", "備え付けられた、供給された、必要なものを備えた", "", "", "", "", "provisto, provista, provistos, provistas", "*動詞 proveer のもう一つの（不規則側の）過去分詞形**であり、形容詞として大活躍し o / ラジオ番組）。"], ["radiografía", "名詞", "レントゲン写真、X線撮影、(比喩的に)詳細な分析・実態の可視化（英語の X-ray に相当）", "f", "radiografías", "", "", "", "に必ずアクセント記号がつきます。病院で撮る「レントゲン・X線写真（hacer una radiografía / レントゲンを撮る）」という超必須の医療・日常単語です。また、ビジネスのニュースや書籍のタイトルなどで **una radiografía de la economía actual** と言うと、「**現代経済の生々しい実態の徹底分析・解剖**」という非常に洗練された比喩表現になります。"], ["radiografiar", "動詞", "レントゲン写真を撮る、X線撮影をする、(比喩的に)実態を詳細に分析する・丸裸にする", "", "", "radiografío, radiografías, radiografía, radiografiamos, radiografiáis, radiografían", "ar動詞（規則変化・アクセント注意）", "", "* nosotros, vosotros 以外で í に必ずアクセント記号がつきます（radiografío, radiografías...）**。物理的なレントゲン撮影のほか、社会問題や組織の現状を細部まで「徹底的に調査・可視化する」という文脈で使われます。"], ["radiograma", "名詞", "無線電報、ラジオグラム（無線で送信される電報）、(医学・古い表現)レントゲン写真", "m", "radiogramas", "", "", "", "尾が -ma ですが、ギリシャ語由来のため**男性名詞（el radiograma）**です。主に船舶や軍事、歴史的な通信の文脈で使われる電報の形式です。"], ["radiolocalización", "名詞", "無線位置測定、電波探知、レーダーロケーション", "f", "radiolocalizaciones", "", "", "", "数形になると ó のアクセント記号が消えます。GPSや電波を使って、対象の物理的な位置を特定する技術的な専門用語です。"], ["radiomedicina", "名詞", "放射線医学（放射性物質や放射線を用いた診断・治療を行う医学分野）", "f", "radiomedicinas", "", "", "", "ん治療や画像診断（PET検査など）を含む、現代医療における重要な先端医学の名称です。"], ["radionavegación", "名詞", "無線航法、電波航法（電波を利用して船舶や航空機を誘導する技術）", "f", "radionavegaciones", "", "", "", "数形になると ó のアクセント記号が消えます。航空宇宙や海事、インフラ技術において必須のナビゲーション専門用語です。"], ["radioperiódico", "名詞", "（主に中南米の古い表現）ニュース放送、ラジオニュース番組", "m", "radioperiódicos", "", "", "", "初の o と、periódico の最初の o にアクセント記号がつきます。かつて新聞（periódico）の役割をラジオが担っていた時代から続く、ニュース番組のレトロな呼び名です。"], ["radioreceptor", "名詞", "ラジオ受信機（物理的なラジオの機械本体）", "m", "radioreceptores", "", "", "", "ディアとしてのラジオ放送（la radio）と区別して、電波を受信する「物理的な装置・家電としての機械」を的確に指す、少し技術的・フォーマルな名詞です。"], ["radioterapia", "名詞", "（医学）放射線治療、ラジエーション（英語の radiotherapy に相当）", "f", "radioterapias", "", "", "", "ん治療の3大療法の一つである「放射線治療」をピンポイントで指す、医療・健康・時事ニュースにおける最重要単語です（例: recibir sesiones de radioterapia / 放射線治療のセッションを受ける）。"], ["radiotransmisor", "名詞", "無線送信機、電波送信機（英語の radio transmitter に相当）", "m", "radiotransmisores", "", "", "", "波を送り出すための通信機器やインフラ設備を指す技術用語です。"], ["radioyente", "名詞", "ラジオのリスナー、ラジオの聴取者（英語の radio listener に相当）", "m / f", "radioyentes", "", "", "", "女同形（el radioyente / la radioyente）。ラジオ番組の制作側やビジネス（広告枠の取引など）の文脈で、番組の「リスナー・オーディエンス」を指す公式で最も標準的な単語です。"], ["radón", "名詞", "（化学）ラドン（無色・無臭の放射性希ガス、元素記号 Rn）", "m", "radones", "", "", "", "尾の o に必ずアクセント記号がつきます（複数形になると消えます）。室内環境の健康リスク（肺がんの原因となる住宅地下のラドンガスなど）のニュースでたびたび登場する、環境・科学の重要単語です。"], ["raedura", "名詞", "擦りむくこと、擦り傷、こすり落としたくず、（古着などの）すり切れ", "f", "raeduras", "", "", "", "詞 raer（こする、すり減らす）の名詞形。物理的に表面が擦れてできた傷や、衣服がボロボロにすり切れている状態を指します。"], ["raer", "動詞", "削り落とす、こすって落とす、（衣服などを）すり減らす、(記憶などから)消し去る（英語の scrape, erase に相当）", "", "", "rayo, raes, rae, raemos, raéis, raen", "er動詞（不規則変化）", "", "*直説法現在1人称単数が rayo（または raigo）となる不規則動詞です**。過去分詞は **raído**（íにアクセント）。物理的にこすり落とす意味のほか、文学的に *raer de la memoria*（記憶から完全に消し去る）という美しい比喩表現でも使われます。"], ["ráfaga", "名詞", "（天候）突風、一陣の風、（光の）きらめき、(マシンガンなどの)連射・斉射、(感情などの)一時の高まり（英語の gust, flash, burst に相当）", "f", "ráfagas", "", "", "", "初の a に必ずアクセント記号がつきます。気象ニュースの「最大突風（**ráfagas de viento**）」として超高頻度で登場するほか、カメラの「連写モード（disparo en ráfaga）」や、暗闇でライトが「パッと一瞬光る様子（ráfaga de luz）」など、短時間に強いエネルギーが断続的に放たれる現象に広く使われる必須単語です。"], ["rafe", "名詞", "（解剖・生物）縫線（ほうせん）、ラフェ（器官の左右を分ける境界の線・筋）", "m", "rafes", "", "", "", "剖学や植物学の教科書に登場する、左右対称の組織が結合している中央の「筋・結合線」を指す専門用語です。"], ["rafi / rafie", "名詞", "ラフィア（ラフィア椰子の葉から採れる天然繊維）", "f", "", "", "", "", "ァッション、インテリア、園芸の文脈で、夏用の麦わら帽子やカゴバッグ、あるいは植物を縛る紐の素材としてお馴染みの「ラフィア（天然の繊維）」を指す生活・アパレル用語です。"], ["rafia", "名詞", "ラフィア、ラフィア椰子（麦わら帽子やカゴバッグの素材となる天然繊維）（英語の raffia に相当）", "f", "rafias", "", "", "", "パレルや園芸、インテリアの文脈で非常によく使われる「ラフィア繊維」の最も標準的なスペルです。"], ["rágula", "名詞", "（※極めて特殊な古語・専門用語）激しい怒り、狂乱", "f", "", "", "", "", "初の a に必ずアクセント記号がつきます。"], ["raicilla", "名詞", "小さな根、細根、(メキシコ)ライシージャ（アガベを原料とする伝統的な蒸留酒）", "f", "raicillas", "", "", "", "aíz（根）の縮小辞形。植物の「細い根」を指すほか、メキシコのハリスコ州などで製造されているテキーラやメスカルの親戚にあたる、伝統的なアルコール飲料の名称としてお酒の文化文脈で有名です。"], ["raído", "形容詞（過去分詞）", "すり切れた、ボロボロの、使い古された（英語の threadbare, worn out に相当）", "", "", "", "", "raído, raída, raídos, raídas", "礎データの整合性保持のため男性形で配置。最初の i に必ずアクセント記号がつきます（動詞 raer の過去分詞）。長年着古して生地が薄くなり、糸が見えてしまっているような衣服や布地を指す定番の形容詞です（例: unos pantalones raídos / すり切れたズボン）。"], ["raigal", "形容詞", "根の、根源的な、根深い、(法律)不動産の（英語の deep-rooted, radical に相当）", "", "", "", "", "raigal, raigal, raigales, raigales", "女同形（複数形は raigales）。比喩的に、人の心や文化に「深く根付いている、根源的な（＝profundamente arraigado）」様子を表現する上品な文章語です。"], ["raigambre", "名詞", "（植物の）根の張り具合、(比喩的に)根強さ、根深く定着した伝統・文化的背景（英語の roots, traditions に相当）", "f", "raigambres", "", "", "", "なる植物の根の集まりだけでなく、比喩的に社会や歴史に深く深く根を下ろしている「伝統、アイデンティティ、絆」を指す、非常に重厚で美しい名詞です（例: una tradición de fuerte raigambre / 非常に根強い伝統）。"], ["raigo / raer", "動詞（直説法現在1人称単数）", "私は削り落とす、私はこする（※動詞 raer の現在形異体）", "", "", "", "", "", "詞 raer の直説法現在1人称単数は、前述の「rayo」のほかに、この「raigo」という形も認められています。"], ["raigón", "名詞", "大きな根、(歯科)残根（ざんこん：歯冠が壊れて歯茎に残った歯の根っこ）", "m", "raigones", "", "", "", "尾の o に必ずアクセント記号がつきます。解剖学・歯科治療の現場において、虫歯などでボロボロになって根元だけ残ってしまった歯のパーツを指す専門・日常単語です。"], ["raíl / rail", "名詞", "レール、軌条、線路、（カーテンなどの）レール（英語の rail に相当）", "m", "raíles / rails", "", "", "", "ペインでは **raíl**（iにアクセント、複数形は raíles）と綴り・発音されることが多く、中南米では英語に近い **rail**（複数形は rails）が好まれる傾向にあります。鉄道の線路のほか、窓やカーテンの可動式レール、工業用のスライドレールを指す必須実務ワードです。"], ["raimiento", "名詞", "（※古い表現・文語）擦りむくこと、恥知らず、図々しさ", "m", "", "", "", "", ""], ["reina", "名詞（女性形）", "女王、王妃、(チェス・トランプ)クイーン、(比喩的に)第一人者・女王（英語の queen に相当）", "f", "reinas", "", "", "", "*超頻出・最重要語**。歴史やニュースの「女王（例: la reina Isabel / イザベル女王）」を指すほか、チェスやトランプの「クイーン」の正式名称です。また、日常会話では男性がパートナーや最愛の娘に対して **\"Mi reina\"**（私の大切な人、お姫様）と呼びかける、愛情表現の定番フレーズでもあります。"], ["reinaldo", "名詞（固有名詞）", "レイナルド（男性の人名）", "m", "", "", "", "", "ペイン語圏で非常によく見られる伝統的な男性のファーストネームの一つです。"], ["reinante", "形容詞", "君臨している、統治している、(比喩的に)流行している、支配的な（英語の reigning, prevailing に相当）", "", "", "", "", "reinante, reinante, reinantes, reinantes", "女同形。動詞 reinar（君臨する）の現在分詞由来。現役の「在位中の国王（el rey reinante）」を指すほか、ビジネスや社会の文脈で **la opinión reinante**（世間の支配的な意見、マジョリティの意見）や「現在流行しているスタイル」を指す際にもよく使われます。"], ["reinar", "動詞", "君臨する、統治する、王として治める、(比喩的に)（静けさや平穏が）満ちている・支配する（英語の reign, prevail に相当）", "", "", "reino, reinas, reina, reinamos, reináis, reinan", "ar動詞（規則変化）", "", "王が国を治めるという意味が基本ですが、小説やニュースなどで **Reina el silencio**（静けさが支配している、あたりがしんと静まり返っている）や *Reina la calma*（平穏が保たれている）のように、特定の雰囲気や状態がその場を「包み込んでいる」と表現する文学的・ジャーナリスティックな超定番描写としても大活躍します。"], ["reincidencia", "名詞", "（犯罪などの）再犯、繰り返すこと、常習（英語の recidivism, relapse に相当）", "f", "reincidencias", "", "", "", "詞 reincidir の名詞形。司法・警察ニュースにおける**「再犯、リピート犯罪」**を指す公式な法律用語です。ビジネスや日常でも、同じミスや悪い癖を「何度も繰り返してしまうこと」に対して警告する文脈で使われます。"], ["reincidente", "形容詞・名詞", "再犯の、(ミスなどを)繰り返す、（名詞として）再犯者、常習犯（英語の repeat offender に相当）", "", "", "", "", "reincidente, reincidente, reincidentes, reincidentes", "尾が -ente のため**男女同形（el reincidente / la reincidente）**。警察の報道で「常習犯・前科のある人物」を指す最重要の時事ワードです（例: un delincuente reincidente / 再犯の犯罪者）。"], ["reincidir", "動詞", "（犯罪やミスを）再び犯す、繰り返す、元の悪い状態に戻る（英語の relapse, repeat an offense に相当）", "", "", "reincido, reincides, reincide, reincidimos, reincidís, reinciden", "ir動詞（規則変化）", "", "* reincidir en + 名詞 ** の形で「（同じ過ちや罪）をまたやってしまう」という形で多用されます（例: Reincidir en el mismo error / 同じミスを再び繰り返す）。反省の色が見えない行動を指摘する際の重要動詞です。"], ["incorporarse / reincorporarse", "動詞（再帰動詞）", "（職場や学校などに）復職する、復帰する、再び合流する（英語の rejoin, return to work に相当）", "", "", "me reincorporo, te reincorporas, se reincorpora, nos reincorporamos, os reincorporáis, se reincorporan", "ar動詞（規則変化・再帰）", "", "*ビジネス・人事労務の超重要ワード**。育休や病気療養、長期休暇を終えた社員が「職場に復帰する」という文脈の公式な大定番表現です（例: Se reincorporará al trabajo el lunes / 彼女は月曜日に職場復帰します）。"], ["reincorporación", "名詞", "（職場や組織への）復職、職場復帰、再合流（英語の reinstatement, return to work に相当）", "f", "reincorporaciones", "", "", "", "数形になると ó のアクセント記号が消えます。人事労務の手続きやキャリアプランの文脈において、産休・育休明けの「復職（reincorporación laboral）」などを指す必須の実務名詞です。"], ["reino", "名詞", "王国、(生物・科学の)界（かい）、(比喩的に)領域・分野（英語の kingdom に相当）", "m", "reinos", "", "", "", "*超頻出語**。スペインの正式国名「スペイン王国（Reino de España）」を構成する絶対必須の国家用語です。また、生物学の「動物界（reino animal）」「植物界（reino vegetal）」、あるいは比喩的に「ファンタジーの世界（el reino de la fantasía）」など、非常に幅広い分野で土台となる概念です。"], ["reintegro", "名詞", "払い戻し、返金、(銀行の)預金引き出し、(宝くじなどの)元返し（英語の refund, withdrawal に相当）", "m", "reintegros", "", "", "", "ジネスや商業での「返金・払い戻し（＝devolución）」を指すほか、ATMなどで口座から「お金を引き出す行為（reintegro de efectivo）」を指す、銀行・金融実務の超重要単語です。"], ["reír / reírse", "動詞", "笑う、（再帰動詞で）笑う、あざ笑う、からかう（英語の laugh, make fun of に相当）", "", "", "río, ríes, ríe, reímos, reís, ríen", "ir動詞（不規則変化・アクセント注意）", "", "*日常会話トップクラスの超必須・重要アクセント不規則動詞**。   1. 通常、日常会話では常に再帰形の **reírse** が好まれます（例: ¿De qué te ríes? / 何を笑っているの？）。   2. **reírse de alguien/algo** の形で「〜を（小馬鹿にして）あざ笑う、からかう」という重要な構文になります。   3. 活用時のほぼ全て（reímos 以外）の **í** にアクセント記号がつく点、および現在分詞が **riendo**、過去分詞が **reído** になる不規則性に厳重な注意が必要です。"], ["reiteración", "名詞", "反復、繰り返し、(法律)累犯（英語の reiteration, repetition に相当）", "f", "reiteraciones", "", "", "", "数形になると ó のアクセント記号が消えます。同じ主張や行動を「何度も繰り返すこと」を指すフォーマルな言葉で、ビジネスの契約書や公式な報告書でよく使われます（＝repetición）。"], ["reiterada / reiterado", "形容詞（過去分詞）", "繰り返された、度重なる、度々の（英語の repeated, reiterated に相当）", "", "", "", "", "reiterado, reiterada, reiterados, reiteradas", "礎データの整合性保持のため女性形で配置。動詞 reiterar の過去分詞。ビジネスの現場で **en reiteradas ocasiones**（度重なる機会に、何度も繰り返し）や、顧客からの *peticiones reiteradas*（度重なる要望）のように、物事が何度も発生している状態を上品に強調する最頻出形容詞です。"], ["reiteradamente", "副詞", "繰り返し、何度も、度々（英語の repeatedly に相当）", "", "", "", "", "", "容詞 reiterado の副詞形。ビジネスメールや公的文書で「〜の件につきましては、以前より何度も繰り返しお伝えしておりますが…」のように、物事をフォーマルに強調する際の定番実務副詞です。"], ["reiterar", "動詞", "繰り返す、反復する、（意見・感謝などを）重ねて表明する（英語の reiterate, repeat に相当）", "", "", "reitero, reiteras, reitera, reiteramos, reiteráis, reiteran", "ar動詞（規則変化）", "", "に何かをリピートする（romper）よりも上品で、ビジネスのやり取りで **Reitero mi agradecimiento**（重ねて感謝申し上げます）や、 *Reitero mi compromiso*（改めて私の決意を表明いたします）のように、自分の意志やメッセージを「強く、丁寧に繰り返して伝える」ためのビジネス必須動詞です。"], ["reivindicación", "名詞", "（権利などの）要求、主張、正当な評価の回復、(テロなどの)犯行声明（英語の claim, demand, vindication に相当）", "f", "reivindicaciones", "", "", "", "数形になると ó のアクセント記号が消えます。政治ニュースや社会運動で「労働者の権利の要求（reivindicación laboral）」として超頻出するほか、ニュース報道においてテロ組織などが出す「犯行声明」を指す際にもこの単語がピンポイントで使用されます。"], ["reivindicar", "動詞", "（正当な権利を）要求する、主張する、(名誉を)回復する、(テロの)犯行声明を出す（英語の claim, demand に相当）", "", "", "reivindico, reivindicas, reivindica, reivindicamos, reivindicáis, reivindican", "ar動詞（規則変化※綴り注意）", "", "*点過去（過去形）の1人称単数で reivindiqué となり、c が qu に変化します**。不当に扱われているグループが「自分たちの正当な権利や地位を勝ち取ろうと強く主張する」という文脈のほか、ニュースで *El grupo terrorista reivindicó el atentado*（テロ組織がその襲撃事件の犯行声明を出した）という時事の重要公式動詞として機能します。"], ["reja", "名詞", "格子（こうし）、鉄格子、(窓の)面格子、(農具)すきの刃（英語の bars, grate, plowshare に相当）", "f", "rejas", "", "", "", "ペインなどの住宅の窓やバルコニーによく取り付けられている防犯用の美しい「鉄格子・面格子」を指します。また、比喩的に **estar tras las rejas** と言うと「（鉄格子の後ろにいる ＝）**刑務所に服役している、収監されている**」という、事件ニュースや警察ドラマの超定番フレーズになります。"], ["rejo", "名詞", "（トゲのある植物の）トゲ、(動物の)針・毒針、(比喩的に)気骨、活力、(カナリア・中南米)タコの足", "m", "rejos", "", "", "", "域によって多義的な日常・土着ワードです。スペインのカナリア諸島や中南米の一部では、市場やレストランで「タコの足（rejo de pulpo）」を指す実用的な食材・水産用語として頻出します。"], ["rejuvenecer", "動詞", "若返らせる、若返る、元気になる、刷新する（英語の rejuvenate に相当）", "", "", "rejuvenezco, rejuveneces, rejuvenece, rejuvenecemos, rejuvenecéis, rejuvenecen", "er動詞（不規則変化・z挿入型）", "", "*直説法現在1人称単数が rejuvenezco となる c->zc 変化動詞です**（接続法現在でも同様）。美容・健康業界のマーケティングで「肌を若返らせる（rejuvenecer la piel）」という文脈や、組織やシステムを「リフレッシュして若返らせる」というビジネス刷新の文脈でよく使われます。"], ["rejuvenecimiento", "名詞", "若返り、アンチエイジング、刷新、活性化（英語の rejuvenation に相当）", "m", "rejuvenecimientos", "", "", "", "詞 rejuvenecer の名詞形。美容医療や化粧品ビジネスにおける「アンチエイジング（rejuvenecimiento facial / 顔の若返り）」という商業ターゲットワードとして、現代ビジネスで極めて高い出現率を誇ります。"], ["relación", "名詞", "関係、関連、つながり、(複数形で)人間関係・交際・人脈、目録・リスト（英語の relation, relationship, list に相当）", "f", "relaciones", "", "", "", "数形になると ó のアクセント記号が消えます。**スペイン語圏の社会・ビジネスを動かす最重要トップクラスの名詞**。   1. **因果関係・関連性**: *relación causa-efecto*（因果関係）。   2. **人間関係・恋愛**: *tener una relación*（（恋人として）付き合っている）。   3. **ビジネス・人脈**: **Relaciones Públicas (RRPP)** で「**広報（PR）、パブリックリレーションズ**」を指し、企業の実務組織として絶対に外せない最重要キーワードです。"], ["relacionada / relacionado", "形容詞（過去分詞）", "関係のある、関連した、結びついた（英語の related に相当）", "", "", "", "", "relacionado, relacionada, relacionados, relacionadas", "礎データの整合性保持のため女性形で配置。動詞 relacionar の過去分詞。 **relacionado con + 名詞** の形で「**〜に関連する、〜関係の**」という、ビジネス文書、論文、日常のあらゆるシーンで1日に何度も使う超重要インフラ構文を作ります（例: los problemas relacionados con el proyecto / プロジェクトに関連する諸問題）。"], ["relacionar", "動詞", "関連づける、結びつける、関係を説明する、（再帰動詞で）人と交際する・コネを持つ（英語の relate, connect, interact に相当）", "", "", "relaciono, relacionas, relaciona, relacionamos, relacionáis, relacionan", "ar動詞（規則変化）", "", "つのデータや事象を論理的に「リンクさせる」という意味のほか、再帰形の **relacionarse con alguien** で「**（ビジネスやプライベートで）人と関わる、人脈を作る、交際する**」という、人間社会のコミュニケーションの土台となる超重要動詞です（例: Es importante relacionarse con profesionales / 専門家たちと人脈を築くことが重要だ）。"], ["relajación", "名詞", "リラクゼーション、リラックス、(筋肉などの)弛緩、(規律などの)緩み・弛緩（英語の relaxation に相当）", "f", "relajaciones", "", "", "", "数形になると ó のアクセント記号が消えます。ストレス社会における「心身の専門的なリラクゼーション（técnicas de relajación / リラックス法）」を指すほか、組織の「気の緩み、規律の低下」を批判する硬い公的文脈でも使われます。"], ["relajada / relajado", "形容詞（過去分詞）", "リラックスした、落ち着いた、のんびりした、(規律が)緩んだ（英語の relaxed に相当）", "", "", "", "", "relajado, relajada, relajados, relajadas", "礎データの整合性保持のため女性形で配置。動詞 relajar の過去分詞。人の様子や場所の雰囲気が「張り詰めておらず、落ち着いていて心地よい状態」を表す定番の形容詞です（例: un ambiente relajado / 落ち着いた雰囲気、リラックスできる空間）。"], ["relajar", "動詞", "緩める、リラックスさせる、緩和する、（再帰動詞で）リラックスする、くつろぐ、気が緩む（英語の relax に相当）", "", "", "relajo, relajas, relaja, relajamos, relajáis, relajan", "ar動詞（規則変化）", "", "常会話では再帰形の **relajarse** が超頻出します。ビジネスで緊張している相手に対して **¡Relájate!**（落ち着いて！、力を抜いて！）と声をかけるほか、「週末は家でのんびりリラックスする」という私生活の描写にも不可欠な重要動詞です。"], ["relamer / relamerse", "動詞", "何度もなめる、(再帰動詞で)唇をなめまわす、(比喩的に)（これから起きる良いことを思って）舌なめずりする、ほくそ笑む（英語の lick one's lips に相当）", "", "", "relamo, relames, relame, relamemos, relaméis, relamen", "er動詞（規則変化）", "", "味しそうな料理を前にして、思わず「ペロリと舌なめずりをする（relamerse los labios）」という人間の本能的な動作や、ビジネスで大成功を目前にして「しめしめとほくそ笑む」ような心理状態をユーモラスに表す定番表現です。"], ["relámpago", "名詞", "稲妻、ひらめき、(名詞の前に置いて)電撃的な、超スピードの（英語の lightning, flash に相当）", "m", "relámpagos", "", "", "", "初の a に必ずアクセント記号がつきます。空に走る「稲妻」を指す自然用語ですが、ビジネスでは他の名詞の後ろに同格で置いて**「電撃的な、超短時間の」**という意味の強力な形容詞的用法として大活躍します（例: **una visita relámpago** / 電撃訪問、弾丸旅行、 *una guerra relámpago* / 電撃戦）。"], ["relance", "名詞", "（偶然の）巡り合わせ、出来事、(テニス・サッカーなどの)再プレー・プレー再開、(漁業)網の一投げ", "m", "relances", "", "", "", "詞 relanzar の派生、あるいは古くは猟や漁の言葉。日常やビジネスでは **de relance** という熟語で「**偶然に、ひょんなことから、ついでに**」という意味の洗練された副詞的表現として使われます。"], ["relanzamiento", "名詞", "（ビジネス）再発売、リニューアル、再立ち上げ、テイクオフ、(ロケットなどの)再打ち上げ（英語の relaunch に相当）", "m", "relanzamientos", "", "", "", "詞 relanzar の名詞形。マーケティングや製品開発において、既存のブランドや商品、ウェブサイトなどをテコ入れして**「再プロモーションする、リニューアルデビューさせる」**という現代ビジネスの必須実務ワードです。"], ["relanzar", "動詞", "（ブランドなどを）再発売する、テコ入れする、リニューアルする、再び投げ出す（英語の relaunch に相当）", "", "", "relanzo, relanzas, relanza, relanzamos, relanzáis, relanzan", "ar動詞（規則変化※綴り注意）", "", "*点過去（過去形）の1人称単数で relancé となり、z が c に変化します**。低迷している事業や商品をもう一度市場でヒットさせるために「再始動する、再び軌道に乗せる」というポジティブな経済・経営用語です。"], ["relatar", "動詞", "物語る、述べる、詳しく話す、報告する（英語の relate, narrate に相当）", "", "", "relato, relatas, relata, relatamos, relatáis, relatan", "ar動詞（規則変化）", "", "に話す（hablar）だけでなく、起きた出来事やストーリーを順序立てて「詳細に描写する、ナレーションする」という意味を持ちます。ニュース、小説、事件の目撃証言などの文脈で非常によく使われる重要動詞です。"], ["relatada / relatado", "形容詞（過去分詞）", "語られた、述べられた、報告された（英語の narrated, told に相当）", "", "", "", "", "relatado, relatada, relatados, relatadas", "礎データの整合性保持のため女性形で配置。動詞 relatar の過去分詞。歴史やニュースで「（証言者や文書によって）語られている事実」を指す際に使われます。"], ["relativas / relativo", "形容詞・名詞", "相対的な、比較上の、〜に関する・関連する、(文法)関係詞（英語の relative に相当）", "", "", "", "", "relativo, relativa, relativos, relativas", "礎データの整合性保持のため女性複数形で配置。   1. **相対的**: 絶対的（absoluto）の対義語としての「相対的な、ケースバイケースの」（例: Todo es relativo / すべては相対的なものだ）。   2. **重要構文**: **relativo a + 名詞** で「**〜に関する、〜関連の（＝con respecto a）**」という、ビジネスや論文で極めて重宝されるフォーマルなインフラ構文を作ります（例: los datos relativos al mercado / 市場に関するデータ）。"], ["relativamente", "副詞", "相対的に、比較的、割合に（英語の relatively に相当）", "", "", "", "", "", "容詞 relativo の副詞形。ビジネスや日常会話で「（他のものと比べると）**比較的、まあまあ**」と表現したいときの定番のクッション・強調副詞です（例: El examen fue relativamente fácil / 試験は比較的簡単だった）。"], ["relativo", "形容詞・名詞", "相対的な、〜に関する、(文法)関係詞（※relativasの単数男性形）", "", "", "", "", "relativo, relativa, relativos, relativas", "法用語の「関係代名詞（pronombre relativo）」や「関係副詞（adverbio relativo）」の構成要素でもあります。"], ["relato", "名詞", "物語、話、ストーリー、(事件などの)陳述、(政治・メディア)ナラティブ（英語の story, tale, narrative に相当）", "m", "relatos", "", "", "", "説の「短編小説、物語（relato corto）」を指すほか、現代の政治やマーケティングにおいて、世論や消費者を惹きつけるための「論理的なストーリー構築、語り口（**el relato político / 政治的ナラティブ**）」を指すトレンドワードとしてニュースで最頻出しています。"], ["relax", "名詞（単複同形）", "リラックス、くつろぎ、休息（英語の relax, relaxation に相当）", "m", "", "", "", "", "語からそのまま取り入れられた外来語名詞。 **un momento de relax**（リラックスするひととき）のように、ホテルのスパや旅行の広告、日常のカジュアルな会話で非常によく使われます。"], ["relevancia", "名詞", "卓越、重要性、関連性、注目すべき価値（英語の relevance, importance に相当）", "f", "relevancias", "", "", "", "なる重要性（importancia）よりも、「（特定のテーマに対して）**大いに価値があること、無視できない存在感を持っていること**」を指す洗練されたビジネス・学術名詞です（例: tener gran relevancia / 非常に大きな重要性を持つ）。"], ["relevante", "形容詞", "重要な、傑出した、価値のある、(テーマに)深く関連する（英語の relevant, important に相当）", "", "", "", "", "relevante, relevante, relevantes, relevantes", "女同形（複数形は relevantes）。ビジネス、論文、ニュースでの必須形容詞。「**見逃せない重要な要素、傑出した実績**」を表現する際に、文脈を非常に知的に引き締めてくれる重要ワードです（例: un dato relevante / 重要なデータ、 un papel relevante / 重要な役割）。"], ["relevo", "名詞", "交替、交代要員、(スポーツ)リレー、(比喩的に)世代交代、引き継ぎ（英語の relief, relay, handover に相当）", "m", "relevos", "", "", "", "詞 relevar の名詞形。   1. **実務・警備**: 交代勤務や、バッキンガム宮殿などでお馴染みの「衛兵交替（relevo de la guardia）」。   2. **スポーツ**: 陸上や水泳の「リレー種目（carrera de relevos）」。   3. **ビジネス**: **relevo generacional** で、企業の「**世代交代、事業承継**」を指す絶対必須の経済・経営キーワードになります。"], ["relé", "名詞", "（電気・電子）リレー、継電器（けいでんき）（英語の relay に相当）", "m", "relés", "", "", "", "尾の e に必ずアクセント記号がつきます。電気回路を制御するための電子部品「リレー」を指す、工学・IT・製造業の専門実務用語です。"], ["relicario", "名詞", "聖遺物箱（せいいぶつばこ）、遺骨箱、(アクセサリー)ロケット（写真などを入れるペンダント）", "m", "relicarios", "", "", "", "史・宗教の文脈では聖人の遺骨や遺品を納める厳格な箱を指しますが、日常のファッションでは、中に恋人や家族の写真、髪の毛などを入れて身につけるペンダントの「ロケット（locket）」を指します。"], ["relieve", "名詞", "（地理）地形、起伏、レリーフ（浮き彫り細工）、(比喩的に)際立つこと、重要性（英語の relief, prominence に相当）", "m", "relieves", "", "", "", ". **地理**: 山や谷などの土地の凸凹、すなわち「地形・起伏（relieve de la tierra）」。   2. **比喩**: **poner de relieve** という固定熟語は、ビジネスやプレゼン、論文で「**〜を際立たせる、強調する、浮き彫りにする（＝destacar）**」という意味で信じられないほど頻出する最高峰のキラーフレーズです（例: Este informe pone de relieve la crisis / この報告書は危機を浮き彫りにしている）。"], ["religión", "名詞", "宗教、信仰（英語の religion に相当）", "f", "religiones", "", "", "", "数形になると ó のアクセント記号が消えます。世界文化、歴史、国際政治を語る上で避けて通れない最重要基礎名詞です（例: libertad de religión / 信教の自由）。"], ["religiosa", "名詞（女性形）・形容詞", "修道女（シスター）、（形容詞として）宗教の、宗教的な、信心深い、(比喩的に)几帳面な・厳格な", "f", "religiosas", "", "", "religioso, religiosa, religiosos, religiosas", "礎データの整合性保持のため女性形で配置。名詞としてカトリックの「修道女（シスター＝monja）」を指すほか、比喩的に **seguir las instrucciones de forma religiosa** と言うと「指示に**きっちり宗教のように厳格に、几帳面に**従う」という、日常・ビジネスの強い強調表現になります。"], ["religiosidad", "名詞", "宗教心、信仰心、敬虔（けいけん）さ、(比喩的に)厳格さ、几帳面さ（英語の religiosity, piety に相当）", "f", "religiosidades", "", "", "", "尾が -dad のため女性名詞。文化人類学や社会学のニュースで、人々の「信仰心の深さ（religiosidad popular / 民衆信仰）」を客観的に論じる際によく使われる上品な名詞です。"], ["religioso", "名詞・形容詞", "修道士、聖職者、（形容詞として）宗教の、宗教的な、信心深い（※religiosaの男性形。英語の religious に相当）", "m", "religiosos", "", "", "religioso, religiosa, religiosos, religiosas", "会・歴史・文化ニュースの必須語（例: libertad religiosa / 信教の自由、 un líder religioso / 宗教指導者）。"], ["reliquia", "名詞", "聖遺物、遺品、形見、(比喩的に)遺物、アンティーク、古くて価値のあるもの（英語の relic に相当）", "f", "reliquias", "", "", "", "史・宗教的な聖人の遺物を指すのが本来の意味ですが、日常会話やガジェット業界では、いまだに現役で動いている古い機械などを愛着や皮肉を込めて「骨董品、過去の遺物（una reliquia）」と呼ぶ際によく使われます。"], ["reloj", "名詞", "時計、腕時計、置き時計（英語の clock, watch に相当）", "m", "relojes", "", "", "", "*末尾が j で終わる超重要基礎名詞**。複数形は **relojes** となり、j の後ろに es がつきます。 **reloj de pulsera** で「腕時計」、 *reloj de pared* で「掛け時計」を指します。また、ビジネスの現場で **contra reloj**（または contrarreloj）と言うと「**時間との戦い、タイムリミット寸前の**」という非常にスリリングな定番の副詞表現になります（例: un trabajo contra reloj / 時間との戦いとなる厳しい仕事）。"], ["relojera / relojero", "名詞（女性形）・形容詞", "時計職人（女性）、時計製造者（女性）、時計店（女性）、（形容詞として）時計の、時計製造の", "f", "relojereras", "", "", "relojero, relojera, relojeros, relojeras", "礎データの整合性保持のため女性形で配置。時計の製造や修理を行うプロフェッショナル、または時計の流通業界を指します。"], ["relojería", "名詞", "時計店、時計修理工房、時計製造業・時計製造技術（英語の watchmaker's shop, horology に相当）", "f", "relojerías", "", "", "", "に必ずアクセント記号がつきます。街角にある「時計屋さん」を指すほか、スイスなどの「時計産業（la relojería suiza）」を指すビジネスニュースの必須名詞です。"], ["relojero", "名詞・形容詞", "時計職人、時計店、時計製造者、（形容詞として）時計の（※relojeraの男性形）", "m", "relojeros", "", "", "relojero, relojera, relojeros, relojeras", "イスの高精度な時計職人を *un maestro relojero* と呼び、ブランドビジネスの世界で非常によく登場します。"], ["reluciente", "形容詞", "光り輝く、ピカピカの、まばゆい、(比喩的に)晴れやかな（英語の shiny, gleaming に相当）", "", "", "", "", "reluciente, reluciente, relucientes, relucientes", "女同形。丁寧に磨き上げられて光を反射している床、車、窓ガラス、あるいは新品のコインなどを指す定番の形容詞です（例: un coche reluciente / ピカピカに磨かれた車）。"], ["relucir", "動詞", "光る、輝く、きらめく、(比喩的に)（才能などが）際立つ、目立つ（英語の shine, gleam に相当）", "", "", "reluzco, reluces, reluce, relucimos, relucís, relucen", "ir動詞（不規則変化・z挿入型）", "", "*直説法現在1人称単数が reluzco となる c->zc 変化動詞です**。物理的な輝きを放つ意味のほか、大定番の決まり文句として **sacar a relucir** という超重要熟語を持ちます。これはビジネスや議論で「**（隠されていた問題や事実を）明るみに引き出す、持ち出す、暴露する**」という意味で信じられないほど頻出します（例: Sacar a relucir un viejo problema / 古い問題を再び持ち出す）。"], ["reluchar", "動詞", "激しく戦う、再び戦う、強く抵抗する", "", "", "relucho, reluchas, relucha, reluchamos, relucháis, reluchan", "ar動詞（規則変化）", "", "詞 luchar（戦う）の強調形。困難や逆境に対して、粘り強く何度も立ち向かっていく様子を表現する文章語です。"], ["relumbrar", "動詞", "強く輝く、ぎらぎら光る、きらめく、(比喩的に)一世を風靡する・ひどく目立つ（英語の glare, glitter に相当）", "", "", "relumbro, relumbras, relumbra, relumbramos, relumbraís, relumbran", "ar動詞（規則変化）", "", "しいほどの強い光を一時的に放つ様子を表します。"], ["relumbre", "名詞", "ぎらぎらする輝き、鈍い光、(比喩的に)見せかけの華やかさ、うわべだけの名声", "m", "relumbres", "", "", "", "物の高貴な輝き（brillo）とは少し異なり、うわべだけがピカピカと誇張されて光っている様子や、中身の伴わない派手さを皮肉る文脈で使われることがあります。"], ["remachar", "動詞", "リベット（鋲）で留める、(比喩的に)（議論や主張を）強く念押しする、決定的に固定する（英語の rivet, emphasize に相当）", "", "", "remacho, remachas, remacha, remachamos, remacháis, remachan", "ar動詞（規則変化）", "", "業的なものづくりで金属のピン（リベット）を打ち込んで固定する意味が原義ですが、日常ビジネスの会話では **Remachó su argumento**（彼は自分の主張を**完全にダメ押しした、強く念押しした**）のように、議論の結びに決定的な一言を放つ比喩表現として非常に好まれます。"], ["remache", "名詞", "リベット、鋲（びょう）、(比喩的に)念押し、締めくくり（英語の rivet に相当）", "m", "remaches", "", "", "", "築や機械、ジーンズのポケットの角を補強する金属の小さなパーツ「リベット」を指す産業・アパレル実務用語です。"], ["remanso", "名詞", "（川の）流れの淀み・緩やかな場所、(比喩的に)心の安らぎ、平穏な場所・オアシス（英語の backwater, haven に相当）", "m", "remansos", "", "", "", "のカーブなどで水流が急に穏やかになっている安全な場所を指します。そこから美しく発展し、 **un remanso de paz** と言うと、騒がしい都会やストレスフルな日常の中で「**ホッと一息つける心のオアシス、静かで安らかな場所**」を表す最高にエレガントな定番比喩表現になります。"], ["remanente", "名詞・形容詞", "残余、残り、(会計・経済)剰余金、繰越金、（形容詞として）残っている、余剰の（英語の remnant, surplus に相当）", "m", "remanentes", "", "", "remanente, remanente, remanentes, remanentes", "女同形。ビジネスの会計実務において、予算や資金の使い残しである「繰越金・剰余金（el remanente presupuestario）」を指す、極めて実用的で公的な経済財務ワードです。"], ["remar", "動詞", "オールで漕ぐ、ボートを漕ぐ、(比喩的に)（目標に向かって）懸命に努力する、逆境を進む（英語の row に相当）", "", "", "remo, remas, rema, remamos, remáis, reman", "ar動詞（規則変化）", "", "ポーツのボート競技などで「漕ぐ」という意味ですが、慣用フレーズ **remar contra corriente**（流れに逆らって漕ぐ ＝ **世間の逆風やトレンドに逆らって、孤軍奮闘して必死に頑張る**）という、ビジネスマンの泥臭い努力を表現する超有名フレーズのコアとなる動詞です。"], ["remarcable", "形容詞", "注目に値する、驚くべき、傑出した（※remarcableのフランス語・英語混同表記、正書法では notable / destacable が標準的）", "", "", "", "", "remarcable, remarcable, remarcables, remarcables", "ランス語の remarquable や英語の remarkable に影響された表現ですが、スペイン語の公式な書き言葉としては **notable**, **destacable**, **llamativo** を使うのが標準的で洗練されています。"], ["remarcar", "動詞", "再度マークする、（強調のために）アンダーラインを引く、(比喩的に)（発言を）強く強調する、念押しする（英語の highlight, stress に相当）", "", "", "remarco, remarcas, remarca, remarcamos, remarcáis, remarcan", "ar動詞（規則変化※綴り注意）", "", "*点過去（過去形）の1人称単数で remarqué となり、c が qu に変化します**。ビジネスミーティングやスピーチにおいて、「ここが最重要ポイントである」と**聞き手に強く念押しして強調する**際の大定番動詞です（例: Cabe remarcar que... / 〜ということを強調しておく必要があります）。"], ["remate", "名詞", "終わり、締めくくり、(スポーツ)シュート・スパイク・スマッシュ、(商業)競売・オークション、バーゲンセール", "m", "remates", "", "", "", "詞 rematar の名詞形。   1. **スポーツ**: サッカーの「（決定的な）シュート」、バレーボールの「スパイク」を指す最頻出ワードです。   2. **比喩**: **para colmo de remate**（または para colmo）で「**泣きっ面に蜂、おまけに最悪なことには**」という日常の定番不満フレーズになります。"], ["remediar", "動詞", "救済する、治療する、（問題などを）解決する、修復する、防ぐ（英語の remedy, prevent に相当）", "", "", "remedio, remedias, remedia, remediamos, remediáis, remedian", "ar動詞（規則変化）", "", "生してしまったミスや悪い状況を「何とかして食い止める、解決する」という意味の必須動詞です。通例、 **no poder remediarse** の形で **「どうしようもない、避けられない」** という諦めのニュアンスでよく使われます（例: Ya no se puede remediar / もう今さらどうしようもない）。"], ["remedio", "名詞", "治療法、医薬品、(比喩的に)解決策、救済策、避ける方法（英語の remedy, solution に相当）", "m", "remedios", "", "", "", "*日常会話で信じられないほど多用される超重要名詞**。   1. **解決策・薬**: 物理的な薬のほか、 *remedio casero*（家庭療法、おばあちゃんの知恵袋）。   2. **大定番フレーズ**: **No hay más remedio que + 動詞原形** で「**〜するよりほかに仕方がない、〜せざるを得ない**」という、日常・ビジネスで毎日必ず使う絶対必須の義務・諦め構文を作ります（例: No hay más remedio que aceptar la oferta / その提案を受け入れるよりほかに選択肢はない）。"], ["remeje", "名詞", "（※極めて特殊な古語・専門用語）混ぜ合わせること、攪拌（かくはん）", "m", "", "", "", "", ""], ["rememoración", "名詞", "追憶、回想、記念、思い出すこと（英語 leather remembrance, commemoration に相当）", "f", "rememoraciones", "", "", "", "数形になると ó のアクセント記号が消えます。過去の歴史的な出来事や偉人をフォーマルに「懐かしみ、記念する」という文脈で使われる、非常に上品な文章語です。"], ["rememorar", "動詞", "追憶する、回想する、思い起こす、記念する（英語の recall, commemorate に相当）", "", "", "rememoro, rememoras, rememora, rememoramos, rememoráis, rememoran", "ar動詞（規則変化）", "", "に思い出す（recordar）よりも文学的で重みがあり、式典や文章の文脈で「過去の栄光や思い出を厳かに振り返る」際に使われます。"], ["remendada / remendado", "形容詞（過去分詞）", "つぎはぎだらけの、補修された、（動物が）斑点のある（英語の patched に相当）", "", "", "", "", "remendado, remendada, remendados, remendadas", "礎データの整合性保持のため女性形で配置。動詞 remendar の過去分詞。破れた箇所に別の布をあてて修理した衣服などを指します。"], ["remendar", "動詞", "つぎを当てる、繕う（つくろう）、補修する、(比喩的に)（欠陥を）その場しのぎで直す（英語の patch, mend に相当）", "", "", "remiendo, remiendas, remienda, remendamos, remendáis, remiendan", "ar動詞（不規則変化：e->ie型）", "", "* nosotros, vosotros 以外で e が ie に変化する語根変化動詞です**。服の穴を針と糸で直すという原義のほか、ビジネスにおいて、根本的な解決をせずに「問題のあるシステムを一時しのぎでパッチを当てて繕う」という批判的な文脈でも使われます。"], ["remiendo", "名詞・動詞（直説法現在1人称単数）", "つぎ、当て布、補修、(比喩的に)その場しのぎの対策、応急処置、（動詞として）私は繕う", "m", "remiendos", "", "", "", "出し語データ（remiendo）は動詞 remendar の現在1人称単数形、または名詞（el remiendo）です。名詞としては、衣服の「つぎはぎ」を指すほか、ビジネスや政治で **un remiendo provisional** と言うと「**一時しのぎの不完全な応急処置、泥縄式の対策**」という、非常に実用的な批判フレーズになります。"], ["remesa", "名詞", "（金銭の）送金、送金額、(商品の)発送、託送貨物（英語の remittance, shipment に相当）", "f", "remesas", "", "", "", "*経済・国際ビジネス・金融の超重要ワード**。海外で働く労働者が母国の家族に送る「国際送金（remesas internacionales）」を指す名詞として毎日のようにニュースに登場するほか、貿易実務において一度に発送される「商品の荷口・ロット」を指す際にも多用されます。"], ["remesón", "名詞", "（中南米・特にチリ）強い揺れ、余震、(比喩的に)（社会・経済の）大揺れ、衝撃", "m", "remesones", "", "", "", "尾の o に必ずアクセント記号がつきます。チリなどの地震頻発地域において、ドカンとくる「強い揺れ・衝撃」を指すほか、政治経済のニュースで「市場に走った激震、大打撃」を比喩的に表現する定番の時事名詞です。"], ["remero", "名詞", "漕ぎ手、ボート競技の選手（英語の rower, oarsman に相当）", "m", "remeros", "", "", "", "詞 remar（漕ぐ）から派生した名詞。スポーツのボート（レガッタ）選手を指します（女性は la remera）。"], ["remilgada / remilgado", "形容詞（過去分詞）・名詞", "気取った、お高くとまった、上品ぶった、神経質な", "", "", "", "", "remilgado, remilgada, remilgados, remilgadas", "礎データの整合性保持のため女性形で配置。話し方や態度が不自然にツンとお上品ぶっていて、細かなことに眉をひそめるような「気取った・扱いづらい」人物の性格を、皮肉やからかいを込めて表現する日常形容詞です。"], ["remilgo", "名詞", "気取り、上品ぶった態度、(複数形で)もったいつけること、過剰な遠慮", "m", "remilgos", "", "", "", "常会話で **sin remilgos** と言うと、「**もったいつけずに、気取らずにズバッと、率直に**」という意味の非常にネイティブ感のある副詞表現になります。"], ["reminiscencia", "名詞", "追憶、かすかな記憶、面影、(芸術・文学などの)影響、過去の遺風（英語の reminiscence に相当）", "f", "reminiscencias", "", "", "", "っきりした記憶ではなく、過去のものが心や作品にほのかに残っている「名残・面影」を指す、非常に洗練された芸術・文学・心理学用語です（例: reminiscenciasの思想）。"], ["remisión", "名詞", "免除、赦免、(医学)寛解（かんかい）、(文書などの)参照、送付（英語の remission, reference に相当）", "f", "remisiones", "", "", "", "数形になると ó のアクセント記号が消えます。   1. **医学**: がんなどの難病の症状が一時的または永続的に治まる「**寛解（remisión de la enfermedad）**」を指す医療最重要ワードです。   2. **実務**: 論文や契約書で、他のページや資料を「参照すること（remisión a la página 5）」。"], ["remitente", "名詞", "（手紙や荷物の）差出人、発信元（英語の sender, return address に相当）", "m / f", "remitentes", "", "", "", "女同形（el remitente / la remitente）。受取人（destinatario）の完全なる対義語であり、手紙、段ボール、ビジネスメールの「**差出人**」を指す、実生活・ビジネス事務の絶対必須ワードです。"], ["remitir", "動詞", "送る、委ねる、(他のページ等を)参照させる、（再帰動詞で）〜に従う・引き合いに出す、（痛みや嵐が）弱まる・和らぐ（英語の send, refer, subside に相当）", "", "", "remito, remites, remite, remitimos, remitís, remiten", "ir動詞（規則変化）", "", "*ビジネスと医療の超重要・多義動詞**。   1. **ビジネス書類**: **Remito los documentos**（書類を送付いたします＝enviar）。   2. **参照**: *remitir a los lectores a la tabla*（読者をその表に参照させる）。   3. **医療・気象**: **La fiebre ha remitido**（**熱が下がった、痛みが和らいだ**、嵐が収まった）という、状況が好転して落ち着くという意味の極めて重要な用法があります。"], ["remo", "名詞", "オール（櫂）、ボート漕ぎ、(複数形で)（動物の）四肢・（人の）手足（英語の oar, rowing に相当）", "m", "remos", "", "", "", "詞 remar（漕ぐ）に使用する「オール」のことで、ボート競技（el remo）そのものも指します。"], ["remoción", "名詞", "解任、罷免、除去、移動（英語の removal, dismissal に相当）", "f", "remociones", "", "", "", "数形になると ó のアクセント記号が消えます。政治・ビジネスニュースにおいて、役職や官僚を「解任・罷免（remoción de un cargo）」する際、あるいは障害物を「撤去する」際の公式な法律・行政ワードです。"], ["remojo", "名詞", "水に浸すこと、水浸け（英語の soaking に相当）", "m", "remojos", "", "", "", "詞 remojar（浸す）の名詞形。料理で「（乾燥豆などを）一晩水に浸しておく（poner en remojo）」という文脈や、洗濯の「つけ置き洗い」を指す日常生活に不可欠な単語です。"], ["remolacha", "名詞", "ビーツ（サトウダイコン）、テンサイ（英語の beetroot, sugar beet に相当）", "f", "remolachas", "", "", "", "やかな赤色が特徴の野菜「ビーツ（ボルシチやサラダの食材）」、または砂糖の原料となる「テンサイ（remolacha azucarera）」を指す必須の食材・農業名詞です。"], ["remolcador", "名詞・形容詞", "タグボート（曳船）、レッカー車、（形容詞として）牽引する、引っ張る（英語の tugboat, tow truck に相当）", "m", "remolcadores", "", "", "remolcador, remolcadora, remolcadores, remolcadoras", "湾で大型船を誘導・牽引する「タグボート（barco remolcador）」や、故障車を運ぶ「レッカー車」を指す実務・インフラ用語です。"], ["remolcar", "動詞", "（船や車を）牽引する、レッカー移動する、引っ張る（英語の tow, tug に相当）", "", "", "remolco, remolcas, remolca, remolcamos, remolcáis, remolcan", "ar動詞（規則変化※綴り注意）", "", "*点過去（過去形）の1人称単数で remolqué となり、c が qu に変化します**。路上で違法駐車した車が「レッカー移動される（ser remolcado）」という文脈や、トラブルを起こした船舶を引っ張る際に使われる必須動詞です。"], ["remolinar / remolinarse", "動詞", "渦を巻く、（再帰動詞で）（群衆などが）一箇所に群がる、渦巻く（英語の swirl, throng に相当）", "", "", "remolino, remolinas, remolina, remolinamos, remolináis, remolinan", "ar動詞（規則変化）", "", "や水がグルグルと渦巻く様子だけでなく、駅のホームや広場で「人々が1箇所にワーッと群がって混雑している状態」を表現する際にも好まれる動詞です。"], ["remolino", "名詞", "渦（うず）、渦巻き、つむじ、(比喩的に)（群衆の）大混雑、混乱（英語の whirlpool, whirlwind, whorl に相当）", "m", "remolinos", "", "", "", "面の「渦」や風の「旋風」のほか、頭頂部にある髪の「つむじ」も remolino と呼びます。また、バーゲン会場などの人の激しい入り乱れを比喩的に指すこともあります。"], ["remolón", "形容詞・名詞", "面倒くさがる、ぐずぐずする、怠ける、（名詞として）なまけ者", "m", "remolones", "", "", "remolón, remolona, remolones, remolonas", "尾の o に必ずアクセント記号がつきます（女性形は remolona）。やるべき事があるのに「あー、面倒だな」とベッドから出ずにぐずぐずしているような人の態度を指す、ユーモラスな日常形容詞です。"], ["remolonear", "動詞", "ぐずぐずする、怠ける、引き延ばす（英語の dawdle, shirk に相当）", "", "", "remoloneo, remoloneas, remolonea, remoloneamos, remoloneáis, remolonean", "ar動詞（規則変化）", "", "常会話で非常に親しまれている動詞。朝起きてからなかなか動き出さずに「ベッドの中でぐずぐず過ごす」という描写や、仕事を始めるのを先延ばしにしてダラダラする様子を表します。"], ["remolque", "名詞", "牽引（けんいん）、トレーラー（被牽引車）、レッカー移動（英語の towing, trailer に相当）", "m", "remolques", "", "", "", "詞 remolcar の名詞形。車の後ろに連結して荷物やキャンプ道具を運ぶ「トレーラー（キャンピングトレーラーなど）」そのものを指す実用的な名詞です。"], ["morder / remorder", "動詞", "何度も噛む、(比喩的に)（良心が）痛む、苛む（さいなむ）（英語の bite, cause remorse に相当）", "", "", "remuerdo, remuerdes, remuerde, remorderemos, remorderéis, remuerden", "er動詞（不規則変化：o->ue型）", "", "* nosotros, vosotros 以外で o が ue に変化する語根変化動詞です**。主に三人称の形で **Le remuerde la conciencia** と使われ、「**（過去の過ちのせいで）良心がひどく痛む、罪悪感に苛まれる**」という文学的かつ日常の強い心理表現になります。"], ["remordimiento", "名詞", "良心の呵責、罪悪感、後悔（英語の remorse, regret に相当）", "m", "remordimientos", "", "", "", "詞 remorder の名詞形。 **sentir remordimientos** で「**罪悪感を抱く、後悔する**」という大定番の感情フレーズを作ります（例: Comer pastel sin remordimientos / 罪悪感なしにケーキを食べる）。"], ["remota / remoto", "形容詞", "遠い、遠く離れた、遥かな、(確率が)極めて低い、リモートの（英語の remote, distant に相当）", "", "", "", "", "remoto, remota, remotos, remotas", "礎データの整合性保持のため女性形で配置。   1. **地理・時間**: *un pasado remoto*（遥か彼方の過去）、 *una isla remota*（辺境の離島）。   2. **確率・ビジネス**: **posibilidad remota** で「**（ゼロではないが）万が一の可能性、極めて低い確率**」。   3. **現代ビジネス**: **trabajo remoto** で「**リモートワーク、在宅勤務**」という最重要現代キーワードになります。"], ["remotamente", "副詞", "遠く、遥かに、(否定文で)全く、微塵も（英語の remotely に相当）", "", "", "", "", "", "容詞 remoto の副詞形。通常、否定文を伴って **No tiene nada que ver, ni remotamente** の形で「**（そんな可能性は）微塵も、これっぽっちもない**」と強烈に否定する、ネイティブが大好きなキラー強調表現になります。"], ["remoto", "形容詞・名詞", "遠い、リモートの、（名詞として、中南米）リモコン（※remotaの男性形）", "", "", "", "", "remoto, remota, remotos, remotas", "南米では、テレビなどのリモコン（control remoto）を単に **el remoto** と呼ぶことがあります（スペインでは mando が一般的）。"], ["remover", "動詞", "かき混ぜる、攪拌（かくはん）する、動かす、(障害などを)取り除く、(古い記憶を)呼び覚ます（英語の stir, remove に相当）", "", "", "remuevo, remueves, remueve, removemos, removéis, remueven", "er動詞（不規則変化：o->ue型）", "", "* nosotros, vosotros 以外で o が ue に変化する語根変化動詞です**。   1. **料理・日常**: スープやコーヒーをスプーンで「かき混ぜる（=agitar）」。   2. **比喩**: *remover el pasado* で「（触れられたくない）過去の出来事をわざわざ掘り返す、蒸し返す」という重要フレーズになります。英語の remove（取り除く）に引き ", "", "", "", "", "remuneratorio, remuneratoria, remuneratorios, remuneratorias", "礎データの整合性保持のため女性形で配置。法律や金融、契約書の文脈において、サービスの対価としての性質を持つ手数料や利息などを形容する専門実務ワードです。"], ["remuneratorio", "形容詞", "報酬を伴う（※remuneratoriaの男性形）", "", "", "", "", "remuneratorio, remuneratoria, remuneratorios, remuneratorias", ""], ["renacer", "動詞", "生まれ変わる、復活する、再生する、(希望などが)再び湧き上がる（英語の be reborn, revive に相当）", "", "", "renazco, renaces, renace, renacemos, renacéis, renacen", "er動詞（不規則変化・z挿入型）", "", "*直説法現在1人称単数が renazco となる c->zc 変化動詞です**（接続法現在でも同様）。歴史的な文化の「ルネサンス・再生」を語るほか、日常やビジネスで **Renace la esperanza**（**希望が再び湧き上がってきた**、どん底から再び兆しが見えてきた）のように、ポジティブな情熱やエネルギーが復活する素晴らしい描写に使われます。"], ["renacimiento", "名詞", "再生、復活、(歴史)ルネサンス（文芸復興）（英語の renaissance, revival に相当）", "m", "renacimientos", "", "", "", "文字を大文字で **Renacimiento** と書くと、14〜16世紀のヨーロッパにおける歴史的な「ルネサンス（文芸復興期）」を指します。小文字では、衰退していたビジネスやアート、都市が「再び息を吹き返す、大復活を遂げる」という現代のポジティブなトレンドを指す重要名詞です。"], ["renacuajo", "名詞", "オタマジャクシ、(比喩的に)ちびっこ、ガキ（英語の tadpole に相当）", "m", "renacuajos", "", "", "", "エルの子である「オタマジャクシ」を指す生物・日常ワードですが、大人が小さな子どもを親しみや、ほんの少しのからかいを込めて「このちびっこめ、ガキんちょ（este renacuajo）」と呼ぶ日常のユーモラスな比喩表現でもあります。"], ["renal", "形容詞", "腎臓の、腎臓に関する（英語の renal, kidney に相当）", "", "", "", "", "renal, renal, renales, renales", "女同形（複数形は renales）。医学・健康・食品表示における超重要必須キーワード。 **cálculo renal** で「**腎臓結石**」、 *insuficiencia renal* で「腎不全」という、ニュースや病院、日常の健康管理で避けて通れない最重要医療形容詞です。"], ["renca / renco", "形容詞", "足の不自由な、足を引きずった、跛行（はこう）の（英語の lame に相当）", "", "", "", "", "renco, renca, rencos, rencas", "礎データの整合性保持のため女性形で配置。怪我などで足を引きずって歩いている状態（＝cojo）を指す、やや土着的、または日常的な表現です。"], ["renco", "形容詞", "足の不自由な（※rencaの男性形）", "", "", "", "", "renco, renca, rencos, rencas", ""], ["rencor", "名詞", "恨み、怨恨（えんこん）、根に持つこと、しこり（英語の rancor, resentment, grudge に相当）", "m", "rencores", "", "", "", "*人間の感情を表す超重要必須名詞**。過去にされた嫌なことをずっと許せずに根に持っている「恨みの感情」を指します。 **guardar rencor a alguien** で「**誰かを恨み続ける、根に持つ**」という形で日常会話、ビジネスのトラブル、映画のセリフなどで凄まじい高頻度で使われます（例: Noね、te guardo rencor / 君を恨んだりはしていないよ、水に流そう）。"], ["rencorosa / rencoroso", "形容詞", "執念 "renovación", "名詞", "更新、リニューアル、刷新、(契約などの)延長、リフォーム（英語の renewal, renovation に相当）", "f", "renovaciones", "", "", "", "数形になると ó のアクセント記号が消えます。**ビジネス・実生活の超重要ワード**。パスポートや免許証、ビザの「**更新手続き（renovación del pasaporte）**」や、オフィスの賃貸契約の「延長」、店舗やウェブサイトの「リニューアル（刷新）」など、毎日の実務でトップクラスに使われる名詞です。"], ["renovada / renovado", "形容詞（過去分詞）", "更新された、一新された、生まれ変わったような、リフレッシュした（英語の renewed に相当）", "", "", "", "", "renovado, renovada, renovados, renovadas", "礎データの整合性保持のため女性形で配置。動詞 renovar の過去分詞。長期休暇を終えた社員が **volver dengan energías renovadas**（**エネルギーを満タンにリフレッシュして戻ってくる**）のように、心身が新品のように生き生きとした状態を表す素晴らしい定番ポジティブ表現です。"], ["renovar", "動詞", "更新する、一新する、リニューアルする、(契約を)延長する、(古い記憶を)呼び覚ます（英語の renew, renovate に相当）", "", "", "renuevo, renuevas, renueva, renovamos, renováis, renuevan", "ar動詞（不規則変化：o->ue型）", "", "* nosotros, vosotros 以外で o が ue に変化する語根変化動詞です**。   1. **事務手続き**: **Renovar el contrato**（契約を更新・延長する）、 *renovar el carné de conducir*（免許を更新する）。   2. **ビジネス・空間**: *renovar el aire*（空気を入れ替える・換気する）、 *renovar el diseño*（デザインを一新する）。"], ["renta", "名詞", "収入、所得、(経済)利得、家賃、賃貸料、(中南米)レンタル、税金（英語の income, rent に相当）", "f", "rentas", "", "", "", "*経済・税務・不動産の超重要国家ワード**。   1. **所得・税金**: スペインの確定申告にあたる「個人所得税」を **IRPF** (Impuesto sobre la Renta de las Personas Físicas)、通称単に **La Renta**（レンタ）と呼び、春のシーズンにニュースを独占する最重要語です。   2. **不動産・家賃**: 部屋を借りる際の「家賃（＝alquiler）」。   3. **慣用句**: **vivir de las rentas** で「（過去の遺産や不労所得だけで暮らす ＝）**過去の栄光や貯金だけで働きもせずダラダラ暮らす**」という強烈な皮肉フレーズになります。"], ["rentabilidad", "名詞", "収益性、採算性、収益力、利回り（英語の profitability, return に相当）", "f", "rentabilidades", "", "", "", "尾が -dad のため女性名詞。**ビジネス経営・投資分析の絶対必須トップワード**。そのビジネスやプロジェクトが「どれだけ効率よく利益を生み出せるか」という「**収益性・採算性**」を指し、事業計画書や決算報告書で最も重要視されるデータ項目の一つです（例: analizar la rentabilidad del proyecto / プロジェクトの採算性を分析する）。"], ["rentable", "形容詞", "利益の出る、もうかる、収益性の高い、採算が取れる、(比喩的に)（やる）価値がある（英語の profitable, worthwhile に相当）", "", "", "", "", "rentable, rentable, rentables, rentables", "女同形（複数形は rentables）。**ビジネスの現場で毎日100回使う超重要形容詞**。コストに見合うだけの利益が出る状態を指し、「**採算が合う、割に合う**」と言いたい時の完全な大定番ワードです（例: Este negocio ya no es rentable / このビジネスはもう採算が取れない（儲からない））。"], ["rentar", "動詞", "利益をもたらす、もうかる、(中南米)賃貸する、レンタルする、借りる（英語の yield a profit, rent に相当）", "", "", "rento, rentas, renta, rentamos, rentáis, rentan", "ar動詞（規則変化）", "", ". **スペイン・経済**: 「利益を生む、割に合う（＝producir renta/beneficio）」（例: ¿Te renta hacer eso? / それってやる価値（メリット）ある？）。   2. **中南米**: 英語の rent の影響が非常に強く、家や車を**「レンタルする、賃貸する、借りる（＝alquilar）」**という意味の日常最頻出動詞として機能します。"], ["renuncio / renunciar", "動詞（直説法現在1人称単数）・名詞", "（動詞として）私は辞退する、私は諦める、（名詞として、トランプ）ルール違反、(比喩的に)矛盾、嘘、ボロを出すこと", "m", "renuncios", "", "", "", "出し語データ（renuncio）は動詞 renunciar の現在1人称単数形、または名詞（el renuncio）です。名詞としては、トランプの反則から転じて、日常会話で **pillar a alguien en un renuncio** と言うと「**（相手の嘘や矛盾を見破って）ボロを出したところを捕まえる、尻尾を掴む**」という非常に面白いネイティブ定番フレーズになります。"], ["renuncia", "名詞", "辞任、辞職、権利放棄、断念、(政治・ビジネス)辞表（英語の resignation, waiver, renunciation に相当）", "f", "renuncias", "", "", "", "詞 renunciar の名詞形。ビジネスや政治のニュースで大物や社長が役職を退く「辞任（**presentar la renuncia** / 辞表を提出する）」や、遺産などの権利を「放棄すること」を指す、極めて実用性の高い公式実務名詞です。"], ["renunciar", "動詞", "辞任する、辞職する、権利を放棄する、諦める、断る（英語の resign, renounce, give up に相当）", "", "", "renuncio, renuncias, renuncia, renunciamos, renunciáis, renuncian", "ar動詞（規則変化）", "", "*ビジネス・法律・日常の超重要必須動詞**。   1. **役職の辞任**: **Renunciar a su cargo**（職を辞する）。   2. **権利・夢の放棄**: ** renuncia a + 名詞/動詞原形 ** の形で「〜を諦める、放棄する」という超重要構文を作ります（例: No voy a renunciar a mis sueños / 夢を諦めるつもりはない）。"], ["reñida / reñido", "形容詞（過去分詞）", "（試合・選挙などが）接戦の、激戦の、反目した、仲の悪い（英語の hard-fought, fiercely contested に相当）", "", "", "", "", "reñido, reñida, reñidos, reñidas", "礎データの整合性保持のため女性形で配置。動詞 reñir（争う）の過去分詞。選挙やスポーツのニュースにおいて **una competencia reñida**（**大接戦のコンペ・激戦**）や、 *elecciones muy reñidas*（大激戦の選挙）のように、実力が伯仲していて勝負の行方がわからない激しい争いを形容する大定番ワードです。"], ["reñir", "動詞", "叱る（しかる）、説教する、喧嘩する、争う、(比喩的に)（デザインなどが）矛盾する・合わない（英語 to scold, quarrel に相当）", "", "", "riño, riñes, riñe, reñimos, reñís, riñen", "ir動詞（不規則変化：e->i型・タ行サ行の特殊変化注意）", "", "*日常会話からニュースまで頻出する、変化に厳重注意の重要不規則動詞**。   1. **叱る**: ** reñir a alguien ** で「（親が子どもなどを）叱る、お説教する」（例: Mi madre me riñó / 母に叱られた）。   2. **喧嘩する**: **reñir con alguien** で「誰かと口論する、喧嘩する」。   3. **活用注意**: 語根の e が i に変わり、さらに ñ の後ろの i が消滅するため、現在分詞は **riñendo**、点過去3人称は *riñó / riñeron* となります。"], ["reo", "名詞・形容詞", "被告人、囚人、罪人、（形容詞として）罪を犯した（英語の defendant, culprit, prisoner に相当）", "m / f", "reos", "", "", "", "性形は **la rea**。司法・警察のニュースや法廷ドラマにおいて、裁判で起訴されている「被告人」や、刑務所に収監されている「囚人」を指す公式な法律・時事用語です（例: el reo de muerte / 死刑囚）。"], ["reojo", "名詞", "（※単体では使わず、常に副詞句で使う）横目、チラ見", "m", "", "", "", "", "*日常会話・小説の描写で最高頻出の副詞句** **mirar de reojo** を構成するコア単語です。これは「**（相手に気づかれないように）横目でチラッと見る、盗み見る**」または「**疑いの目で見る**」という意味になり、人間の自然な仕草を表現するのに絶対に外せない超重要フレーズです（例: Me miró de reojo / 彼は私を横目でチラリと見た）。"], ["reorganización", "名詞", "再編成、組織改革、リストラ、再構築（英語の reorganization に相当）", "f", "reorganizaciones", "", "", "", "数形になると ó のアクセント記号が消えます。動詞 reorganizar の名詞形。ビジネスニュースにおいて、企業の経営立て直しや効率化のための「組織改編・社内改革（reorganización empresarial）」を指す重要実務ワードです。"], ["reorganizar", "動詞", "再編成する、組織を改革する、再構築する（英語の reorganize に相当）", "", "", "reorganizo, reorganizas, reorganiza, reorganizamos, reorganizáis, reorganizan", "ar動詞（規則変化※綴り注意）", "", "*点過去（過去形）の1人称単数で reorganicé となり、z が c に変化します**。無駄の多いプロジェクトや部門を「スマートに立て直す、配置換えをして最適化する」という文脈のビジネス必須動詞です。"], ["reorientación", "名詞", "方向転換、再方向付け、(ビジネス)ピボット、軌道修正（英語の reorientation に相当）", "f", "reorientaciones", "", "", "", "数形になると ó のアクセント記号が消えます。市場環境の変化に合わせて、企業の戦略やキャリアの進路を「ガラリと見直して新しい方向へ舵を切ること（reorientación estratégica）」を指す経営実務ワードです。"], ["reorientar", "動詞", "方向転換させる、再方向付けする、軌道修正する、新しい舵を切る（英語の reorient に相当）", "", "", "reoriento, reorientas, reorienta, reorientamos, reorientáis, reorientan", "ar動詞（規則変化）", "", "ジネスのプロジェクトが当初の目標からズレた際や、事業のターゲット層をシフトする際に「**正しい方向へ軌道修正する、ベクトルを合わせ直す**」という意味で非常によく使われます。"], ["repagar", "動詞", "（借入金などを）返済する、完済する、過分に支払う（英語の repay に相当）", "", "", "repago, repagas, repaga, repagamos, repagáis, repagan", "ar動詞（規則変化）", "", "融やビジネスローン、個人の借金を「払い戻す、返済する」という意味の財務実務ワードです（＝devolver, amortizar）。"], ["repago", "名詞", "（ローンの）返済、償還、返済金（英語の repayment に相当）", "m", "repagos", "", "", "", "行や投資の文脈で、融資や債券の「返済プロセス・スケジュール（capacidad de repago / 返済能力）」を指す専門的な金融用語です。"], ["repantigarse", "動詞（再帰動詞）", "（ソファなどに）踏んぞり返って座る、体中を伸ばしてゆったりとくつろぐ（英語の lounge, sprawl に相当）", "", "", "me repantigo, te repantigas, se repantiga, nos repantigamos, os repantigáis, se repantigan", "ar動詞（規則変化※再帰・綴り注意）", "", "*点過去（過去形）の1人称単数で me repantigué となり、g が gu に変化します**。仕事が終わった後に、自宅の大きなソファにお尻を沈めて「**だらしなく、かつ最高にリラックスして足を伸ばして座る**」という人間のオフの姿勢をピンポイントで指す、とても表情豊かな日常動詞です。"], ["repara / reparo", "名詞・動詞（直説法現在1人称単数）", "（動詞として）私は修理する、私は気づく、（名詞として、※reparoの異体またはミスペア、基礎データの整合性保持のため配置）", "", "", "", "", "", "出し語（repara）は動詞 reparar の直説法現在3人称単数形（または命令形）です。"], ["reparable", "形容詞", "修理可能な、修復できる、取り返しのつく（英語の repairable に相当）", "", "", "", "", "reparable, reparable, reparables, reparables", "女同形（複数形は reparables）。故障したマシンの「修理ができること」を指すほか、比喩的に「犯してしまったミスや損害が**まだ取り返しのつくレベルであること**（un daño reparable）」を表現する際にも役立つ実務形容詞です（対義語は irreparable）。"], ["reparación", "名詞", "修理、修復、メンテナンス、(比喩的に)（名誉の）回復、(歴史・国際)賠償、補償（英語の repair, reparation に相当）", "f", "reparaciones", "", "", "", "数形になると ó のアクセント記号が消えます。動詞 reparar の名詞形。   1. **日常・機械**: スマホや車の「修理・修理費用（**gastos de reparación**）」。   2. **公的・歴史**: 損害を与えた相手や国に対する「賠償・補償（reparación de daños）」。"], ["reparada / reparado", "形容詞（過去分詞）", "修理された、修復済みの（英語の repaired, fixed に相当）", "", "", "", "", "reparado, reparada, reparados, reparadas", "礎データの整合性保持のため女性形で配置。動詞 reparar の過去分詞。中古品などの販売サイトや機材のステータス管理で **producto reparado** と言うと、いわゆる「**整備済み製品、リファビッシュ品**」を指す現代ビジネスの定番ワードになります。"], ["reparador", "形容詞", "修理する、（心身を）回復させる、元気を回復させる、心地よい（英語の restorative, refreshing に相当）", "", "", "", "", "reparador, reparadora, reparadores, reparadoras", "容や健康のマーケティングにおいて、 **un sueño reparador**（**質の高い、すっきりと疲れの取れる最高の睡眠**）や、皮膚を保護する *crema reparadora*（リペアクリーム）のように、ダメージを受けた心身を元の健康な状態へ「劇的に癒やして回復させる」というニュアンスで大活躍するポジティブ形容詞です。"], ["reparar", "動詞", "修理する、直す、(損害を)補償する、**気づく**、**注意を払う**（英語の repair, notice に相当）", "", "", "reparo, reparas, repara, reparamos, reparáis, reparan", "ar動詞（規則変化）", "", "*日常会話からビジネスまで絶対必須の超重要多義動詞**。   1. **修理する**: 壊れたスマホや家電を「直す（＝arreglar）」（例: Reparar el coche）。   2. **気づく（最重要構文）**: ** reparar en + 名詞 ** の形で「**〜に気づく、〜に目を留める（＝notar, darse cuenta de）**」という意味になり、小説やスマートな会話で最高頻出します（例: No reparé en ese detalle / その詳細には気づきませんでした）。"], ["reparo", "名詞", "修理、気づき、**躊躇（ちゅうちょ）、ためらい、難色、異議**（英語の objection, qualm に相当）", "m", "reparos", "", "", "", "*ビジネスの交渉や日常の心理表現で極めて重要な隠れた名詞**。   1. **躊躇・難色**: **poner reparos a algo** で「**〜に難色を示す、異議を唱える、ケチをつける**」という大定番フレーズを作ります。   2. **決まり文句**: **sin ningún reparo** で「**なんの躊躇もなく、すんなりと、堂々と**」という意味の非常に洗練された表現になります（例: Aceptó la crítica sin reparos / 彼は批判を躊躇なく受け入れた）。"], ["repartición", "名詞", "分配、配分、(中南米)（行政の）部局、官庁、部署（英語の distribution, department に相当）", "f", "reparticiones", "", "", "", "数形になると ó のアクセント記号が消えます。利益や物資を「分けること（＝reparto）」を指すほか、ラテンアメリカの公的な文脈では、政府機関の「行政組織の各部署・局」を指す行政実務ワードとして機能します。"], ["repartida / repartido", "形容詞（過去分詞）", "分配された、配られた、分散した（英語の distributed, divided に相当）", "", "", "", "", "repartido, repartida, repartidos, repartidas", "礎データの整合性保持のため女性形で配置。動詞 repartir の過去分詞。タスクや利益が全員に満遍なく「行き渡っている状態」を指します。"], ["repartidor", "名詞", "配達員、配達ドライバー、配電盤、ディストリビューター（英語の delivery person に相当）", "m", "repartidores", "", "", "", "性形は **la repartidora**。ECサイトの普及やフードデリバリーの爆発的成長に伴い、現代の生活やビジネスニュースで最も身近となった「**配達員・配達スタッフ**」を指す超必須の日常・労働単語です（例: repartidor de comida / フードデリバリーの配達員）。"], ["repartimiento", "名詞", "分配、配分、(歴史)レパルティミエント（スペイン植民地時代の先住民の強制割り当て労働制度）", "m", "repartimientos", "", "", "", "般的な分配（reparto）という意味のほか、世界史や中南米の歴史の教科書で必ず登場する「植民地期の先住民割当制度」という、歴史社会学的な重要専門用語でもあります。"], ["repartir", "動詞", "分配する、配る、配達する、(タスクを)分担する、（再帰動詞で）体をいくつにも分けるように忙しく立ち回る（英語の distribute, deliver, share に相当）", "", "", "reparto, repartis, reparte, repartimos, repartís, reparten", "ar動詞（規則変化）", "", "*日常・ビジネスの超重要最頻出動詞**。   1. **日常・実務**: チラシや書類を「配る」、荷物を「配達する」（例: Repartir paquetes / 荷物を配達する）。   2. **ビジネス**: **repartir el trabajo** で「**仕事を分担する・タスクを割り振る**」、 *repartir beneficios* で「利益を分配する」。"], ["reparto", "名詞", "分配、配分、配達、デリバリー、(映画・演劇の)キャスト、配役（英語の delivery, distribution, cast に相当）", "m", "repartos", "", "", "", "*多義の最重要実務ワード**。   1. **物流・日常**: 自宅への配送や「配達業務」そのものを指します（例: un camión de reparto / 配達トラック）。   2. **エンタメ**: 映画やドラマのクレジットに登場する「**キャスト・出演者陣（＝elenco）**」を指すエンタメ業界の定番名詞です。"], ["repasadura", "名詞", "（※古い表現・職人用語）再確認すること、磨き直すこと、仕上げのチェック", "f", "", "", "", "", ""], ["repasar", "動詞", "復習する、見直す、読み返す、おさらいする、(チェックのために)ざっと目を通す（英語の review, check, go over に相当）", "", "", "repaso, repasas, repasa, repasamos, repasáis, repasan", "ar動詞（規則変化）", "", "*教育・ビジネスの絶対必須動詞**。   1. **勉強**: テストの前にノートや単語を「復習する・おさらいする」（例: Repasar la lección / レッスンを復習する）。   2. **ビジネス実務**: 提出する前の書類やメールに誤字脱字がないか「**最終チェックをする、見直す**」という文脈で毎日のように使われます（例: Déjame repasar el informe / 報告書を見直させてください）。"], ["repaso", "名詞", "復習、おさらい、見直し、チェック、(比喩的に)手厳しい批判（英語の review, check に相当）", "m", "repasos", "", "", "", "詞 repasar の名詞形。 **dar un repaso a algo** の形で「**〜をざっと見直す、確認する**」というビジネスの超定番実務フレーズを作ります（例: Vamos a darle un repaso a los números / 数字を一度チェックしましょう）。"], ["repechar", "動詞", "（険しい坂を）登る、苦労して進む", "", "", "repecho, repechas, repecha, repechamos, repecháis, repechan", "ar動詞（規則変化）", "", "転車競技やハイキングにおいて、目の前に現れた非常にタフで急な上り坂を、息を切らしながら力強く登る様子を表す動詞です。"], ["repecho", "名詞", "急坂、険しい上り坂、小高い丘（英語の steep slope に相当）", "m", "repechos", "", "", "", "イクリングやランニング、あるいは日常の歩行において、体力を激しく消耗させるような「グッと目の前に立ちふさがる短い急な坂道」をピンポイントで指す実用名詞です。"], ["repeler", "動詞", "追い払う、撃退する、拒絶する、（水や汚れを）弾く（はじく）、嫌悪感を抱かせる（英語の repel, ward off, disgust に相当）", "", "", "repelo, repeles, repele, repelemos, repeléis, repelen", "er動詞（規則変化）", "", "*科学・ビジネス・日常の超重要多義動詞**。   1. **製品機能**: 防水スプレーなどが「水を弾く」や、蚊除けスプレー（repelente）が「虫を寄せ付けない・追い払う」。   2. **心理・人間関係**: 誰かの態度や見た目が生理的に「**嫌悪感を抱かせる、受け付けない**」という強い拒絶のニュアンスを表現します（例: Su actitud me repele / 彼の態度には拒絶反応を覚える）。"], ["repelente", "名詞・形容詞", "虫除け、忌避剤、（形容詞として）不快な、嫌悪感を抱かせる、水を弾く、(子どもが)小生意気な（英語の repellent, disgusting に相当）", "m", "repelentes", "", "", "repelente, repelente, repelentes, repelentes", "女同形。   1. **実用**: 夏の旅行の必須アイテムである「**虫除けスプレー（repelente de mosquitos）**」。   2. **日常・性格**: 態度がお高くとまっていて鼻につく、あるいは「大人のような口をきく小生意気な子ども」を軽蔑や皮肉を込めて形容する際にもよく使われます。"], ["repellar", "動詞", "（建築・主に中南米）下塗りをする、壁に漆喰（モルタル）を塗る（英語の plaster に相当）", "", "", "repello, repellas, repella, repellamos, repelláis, repellan", "ar動詞（規則変化）", "", "築・DIYの文脈において、レンガの壁などの表面にモルタルや泥、漆喰を塗ってなめらかに仕上げる「左官作業」を指す専門・実務動詞です（スペインでは revocar や enlucir が好まれます）。"], ["repello", "名詞", "（建築・主に中南米）壁の下塗り、モルタル（漆喰）塗り（英語の plastering に相当）", "m", "repellos", "", "", "", "詞 repellar の名詞形。建築現場の仕上げ加工や、不動産の物件状態を説明する際の実務用語です。"], ["repentina / repentino", "形容詞", "突然の、不意の、急な、思いがけない（英語の sudden, abrupt に相当）", "", "", "", "", "repentino, repentina, repentinos, repentinas", "礎データの整合性保持のため女性形で配置。何の前触れもなく物事が急激に発生した状態を指します。ニュースや医療で **muerte repentina**（**突然死**）や、ビジネスでの *cambio repentino*（急な変更）のように、インパクトのある事象を形容する必須ワードです。"], ["repentinamente", "副詞", "突然、不意に、急に（英語の suddenly に相当）", "", "", "", "", "", "容詞 repentino の副詞形。ストーリー展開やニュースの報道で「**突然、一瞬にして何かが起こった**」と描写したいときに絶対外せない大定番の強調副詞です（＝de repente）。"], ["repentino", "形容詞", "突然の、急な（※repentinaの男性形）", "", "", "", "", "repentino, repentina, repentinos, repentinas", ""], ["repercusión", "名詞", "影響、反響、響き、余波、(医学)波及（英語の repercussion, impact, echo に相当）", "f", "repercusiones", "", "", "", "数形になると ó のアクセント記号が消えます。**ビジネス・政治ニュースの最高峰の重要名詞**。単なる影響（efecto）よりも、世間に引き起こした「**大きなニュース性、波紋、大反響**」という重みのあるニュアンスを持ちます（例: **tener gran repercusión** / 社会的に大反響を呼ぶ、大きな波紋を広げる）。"], ["repercutir", "動詞", "影響を及ぼす、響く、(コストなどを)転嫁する、反映される（英語の repercute, impact, affect に相当）", "", "", "repercuto, repercutes, repercute, repercutimos, repercutís, repercuten", "ir動詞（規則変化）", "", "*ビジネス経済ニュースの絶対必須動詞**。   1. **因果関係**: ** repercutir en + 名詞 ** の形で「**〜に（ダイレクトに）悪影響・影響を及ぼす**」という最重要構文を作ります（例: La crisis va a repercutir en el empleo / 危機は雇用に悪影響を及ぼすだろう）。   2. **コスト実務**: 増税や原材料の高騰分を「最終価格に**転嫁する**」というビジネス実務のキラー表現でもあります。"], ["repertorio", "名詞", "レパートリー、持ちネタ、(データなどの)目録、コレクション、(比喩的に)（言い訳などの）引き出し（英語の repertoire, repertoire に相当）", "m", "repertorios", "", "", "", "楽家や俳優の「演奏・演技のレパートリー」を指すのが原義ですが、日常会話やビジネスでも **un amplio repertorio de excusas**（**山ほどある言い訳のコレクション、豊富な言い訳の引き出し**）のように、特定の言動や手段のバリエーションをユーモラスに表現する定番ワードです。"], ["repesca", "名詞", "(スポーツ)敗者復活戦、(教育・スペイン)追試、 caciones", "", "", "", "数形になると ó のアクセント記号が消えます。生物学における「DNAの複製（replicación del ADN）」や、ITインフラにおいてサーバーのデータを同期・二重化する「データレプリケーション」を指す最新の専門・実務キーワードです。"], ["replicar", "動詞", "言い返す、反論する、答える、(科学・IT)複製する、レプリケーションを行う（英語の reply, argue, replicate に相当）", "", "", "replico, replicas, replica, replicamos, replicáis, replican", "ar動詞（規則変化※綴り注意）", "", "*点過去（過去形）の1人称単数で repliqué となり、c が qu に変化します**。   1. **日常・議論**: 目上の人や交渉相手に対して「（あぁだこうだと）**口答えする、言い返す、反論する**」という意味で最頻出します（例: ¡No me repliques! / 口答えするな！）。   2. **ビジネス・科学**: 成功したモデルや実験結果を別の場所でそっくりそのまま「再現する、コピーする」。"], ["repoblación", "名詞", "人口再居住、再植林、（魚などの）放流、稚魚の補給（英語の repopulation, reforestation に相当）", "f", "repoblaciones", "", "", "", "数形になると ó のアクセント記号が消えます。過疎化した地域に再び人を呼び戻す行政プロジェクトや、環境保護のための「再植林（repoblación forestal）」、川や海に稚魚を放つ「放流」を指す時事・環境ワードです。"], ["repoblar", "動詞", "再び人を住まわせる、再植林する、(魚などを)放流する（英語の repopulate, reforest に相当）", "", "", "repueblo, repueblas, repuebla, repoblamos, repobláis, repueblan", "ar動詞（不規則変化：o->ue型）", "", "* nosotros, vosotros 以外で o が ue に変化する語根変化動詞です**。自然保護や地方創生のニュースで不可欠な動詞です。"], ["repoio / repollo", "名詞", "キャベツ（※repolloの誤字、または一部地域の口語的スペル揺れ）", "", "", "", "", "", "式なスペイン語の標準スペルは下記に示す **repollo** です。"], ["repollo", "名詞", "キャベツ（英語の cabbage に相当）", "m", "repollos", "", "", "", "*超必須の食材・日常名詞**。スペイン語圏のスーパーや市場、レストランのメニューで「キャベツ」を指す大定番の単語です（一部地域では col とも呼ばれますが、repollo も同様に絶大な普及度を誇ります）。"], ["reponer", "動詞", "元に戻す、補充する、再開する、(再帰動詞で)（健康を）回復する、立ち直る（英語の replace, restock, recover に相当）", "", "", "repongo, repones, repone, reponemos, reponéis, reponen", "er動詞（不規則変化・poner型）", "", "*日常・ビジネスの超重要トップクラス不規則動詞**。   1. **物流・実務**: 商品や在庫を「棚に補充する（**reponer inventario**）」。   2. **再帰形 (reponerse)**: 病気やショックから「**回復する、立ち直る**」という文脈で絶対必須です（例: Espero que te repongas pronto / 早く元気になってね）。   3. **活用**: 動詞 poner と完全に同じ不規則変化をします（点過去: repuse, 過去分詞: repuesto）。"], ["reportación", "名詞", "（※特殊な古語・法務用語）耐えること、自制、(メキシコ金融)レポ取引", "f", "", "", "", "", ""], ["reportada / reportado", "形容詞（過去分詞）", "報告された、通報された、(再帰動詞で)自制した（英語の reported に相当）", "", "", "", "", "reportado, reportada, reportados, reportadas", "礎データの整合性保持のため女性形で配置。動詞 reportar の過去分詞。ITプラットフォームやSNSの運営実務において、規約違反でユーザーから「通報されたアカウント（un usuario reportado）」などを指す現代最頻出ワードです。"], ["reportar", "動詞", "報告する、リポートする、(利益を)もたらす、(SNS等で)通報する、(再帰動詞で)自制する（英語の report に相当）", "", "", "reporto, reportas, reporta, reportamos, reportáis, reportan", "ar動詞（規則変化）", "", "*グローバルビジネス・ITの超必須動詞**。   1. **ビジネス**: 上司やチームに状況を「報告する」（例: Reportar el progreso / 進捗を報告する）。   2. **経済**: *reportar beneficios* で「大きな利益・メリットをもたらす」。   3. **ネット実務**: 迷惑ユーザーやバグをシステムに「**通報する、報告（レポート）する**」という、現代ネット社会のインフラワードです。"], ["reporte", "名詞", "報告、リポート、報告書、(ネット)通報、ニュース記事（英語の report に相当）", "m", "reportes", "", "", "", "*ビジネス・IT実務の最頻出名詞**。スペインでは informe（報告書）がよく使われますが、中南米およびグローバルなIT・ビジネス環境では **el reporte** が「**週次レポート（reporte semanal）**」や「バグ報告」「違反通報」を指す圧倒的な主役ワードとして機能します。"], ["reportera / reportero", "名詞（女性形）", "記者、リポーター、報道員（英語の reporter に相当）", "f", "reporteras", "", "", "", "礎データの整合性保持のため女性形で配置。テレビのニュース番組などで、事件や事故の現場からマイクを持って生中継を行う「女性リポーター・記者」を指すメディア必須名詞です。"], ["reportero", "名詞", "記者、リポーター（※reporteraの男性形）", "m", "reporteros", "", "", "", "聞やテレビ、ネットメディアの前線で取材を行う「記者」の定番表現です（＝periodista）。"], ["reposada / reposado", "形容詞（過去分詞）", "落ち着いた、穏やかな、静かな、(食品)寝かせた・熟成させた（英語の calm, rested に相当）", "", "", "", "", "reposado, reposada, reposados, reposadas", "礎データの整合性保持のため女性形で配置。動詞 reposar の過去分詞。人の態度が「知的で落ち着いている様子」を表すほか、テキーラの熟成ランクにおいて、数ヶ月樽で寝かせた高級なボトルを **Tequila Reposado（テキーラ・レポサド）** と呼び、世界的に非常に有名です。"], ["reposar", "動詞", "休む、休息する、横になる、（料理で）寝かせる、落ち着く（英語の rest, settle に相当）", "", "", "reposo, reposas, reposa, reposamos, reposáis, reposan", "ar動詞（規則変化）", "", "に眠る（dormir）のではなく、疲れた体を横にして「ゆったりと休ませる、静養する」という意味を持ちます。また、料理のレシピで「生地を15分休ませる（dejar reposar la masa）」という時にも必ず使われる重要動詞です。"], ["reposición", "名詞", "補充、補給、復職、(TV)再放送、(法律)異議申し立て（英語の replenishment, restocking, rerun に相当）", "f", "reposiciones", "", "", "", "数形になると ó のアクセント記号が消えます。動詞 reponer の名詞形。店舗や倉庫における「商品の棚卸し・在庫補充（reposición de productos）」という流通実務の超重要コア単語です。"], ["reposo", "名詞", "休息、静養、安息、静止（英語の rest, repose に相当）", "m",
