<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>スペイン語不規則活用動詞</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 20px; background: #f9f9f9; }
  h1 { font-size: 18px; margin-bottom: 16px; color: #333; }
  .legend { display: flex; gap: 20px; margin-bottom: 14px; font-size: 13px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 18px; height: 18px; border: 1px solid #ccc; border-radius: 3px; }
  .controls { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  button {
    padding: 8px 20px; font-size: 14px; cursor: pointer;
    background: #4a7fdc; color: #fff; border: none; border-radius: 6px;
    transition: background 0.15s;
  }
  button:hover { background: #2f5dbf; }
  button:active { transform: scale(0.97); }
  #sortBtn, #filterBtn, #filterLearnedBtn, #resetBtn { background: #888; }
  #sortBtn.on  { background: #e07b00; } #sortBtn.on:hover  { background: #bf6500; }
  #filterBtn.on{ background: #b8960a; } #filterBtn.on:hover{ background: #9a7d08; }
  #filterLearnedBtn.on { background: #1b7a68; } #filterLearnedBtn.on:hover { background: #145c4e; }
  #resetBtn:hover { background: #555; }
  #progress { font-size: 13px; color: #555; align-self: center; }
  table { border-collapse: collapse; font-size: 13px; }
  th { background: #3a3a5c; color: #fff; padding: 7px 12px; text-align: left; white-space: nowrap; }
  td { padding: 6px 12px; border-bottom: 1px solid #e0e0e0; white-space: nowrap; }
  tr:hover td { filter: brightness(0.95); }
  tr.row-learned td { opacity: 0.35; }
  tr.row-learned td.learn-cell { opacity: 1; }
  .bg-gray   { background: #d9d9d9; }
  .bg-yellow { background: #ffff99; }
  .bg-white  { background: #ffffff; }
  td.imp { background: #ebebf5 !important; text-align: center; min-width: 82px; }
  td.learn-cell { background: #f0faf6 !important; text-align: center; width: 52px; }
  .stars span { font-size: 17px; cursor: pointer; color: #ccc; display: inline-block; }
  .stars span.on { color: #f5a623; }
  .stars span:hover { color: #f5a623; opacity: 0.75; }
  .learn-btn {
    padding: 3px 8px; font-size: 15px; cursor: pointer; border-radius: 4px;
    background: #e8e8e8; color: #bbb; border: 1.5px solid #ccc;
    transition: all 0.12s; line-height: 1;
  }
  .learn-btn:hover { background: #d4f5e8; border-color: #6db85c; color: #4a9a3d; }
  .learn-btn.on {
    background: #d4f5e8; border-color: #6db85c; color: #2a7a1e; font-weight: 700;
  }
  .learn-btn:active { transform: scale(0.93); }
  td.verb-cell { cursor: pointer; color: #2a5abf; text-decoration: underline dotted; font-weight: 600; }
  td.verb-cell:hover { color: #1a3d99; background: #e8eeff !important; }

  /* モーダル */
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 200;
    justify-content: center; align-items: center;
  }
  #overlay.show { display: flex; }
  #modal {
    background: #fff; border-radius: 14px;
    padding: 28px 32px 24px; max-width: 520px; width: 93%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    position: relative; max-height: 90vh; overflow-y: auto;
  }
  #modal h2 { margin: 0 0 16px; font-size: 24px; color: #3a3a5c; }
  .msec { margin-bottom: 13px; }
  .mlabel {
    font-size: 10px; font-weight: 700; letter-spacing: .08em;
    color: #999; text-transform: uppercase; margin-bottom: 5px;
  }
  .mbox-blue {
    font-size: 16px; font-style: italic; color: #111;
    background: #f0f4ff; border-left: 4px solid #4a7fdc;
    padding: 9px 13px; border-radius: 4px;
  }
  .mbox-green {
    font-size: 13px; color: #2d4d20; background: #f2faf0;
    border-left: 4px solid #6db85c; padding: 9px 13px; border-radius: 4px;
    line-height: 1.65;
  }
  .mbox-orange {
    font-size: 13px; color: #4d2d00; background: #fff8f0;
    border-left: 4px solid #e08c30; padding: 9px 13px; border-radius: 4px;
    line-height: 1.65;
  }
  .mja  { font-size: 14px; color: #333; padding: 2px 0; }
  .mnote{ font-size: 13px; color: #555; line-height: 1.6; }
  .idiom-row { margin-bottom: 6px; }
  .idiom-es { font-style: italic; color: #1a1a1a; }
  .idiom-ja { color: #555; font-size: 12px; }
  #modal-close {
    position: absolute; top: 12px; right: 16px;
    font-size: 22px; cursor: pointer; color: #aaa;
    background: none; border: none; line-height: 1;
  }
  #modal-close:hover { color: #333; }

  /* ── スマホ対応 ── */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  @media (max-width: 640px) {
    body { padding: 12px 10px; }
    h1 { font-size: 15px; margin-bottom: 12px; }
    .legend { gap: 10px; font-size: 12px; margin-bottom: 10px; }
    .swatch { width: 14px; height: 14px; }
    .controls { gap: 6px; margin-bottom: 12px; }
    button { padding: 6px 10px; font-size: 12px; }
    #progress { font-size: 12px; }
    th { padding: 6px 8px; font-size: 11px; }
    td { padding: 5px 7px; font-size: 12px; }
    td.imp { min-width: 66px; }
    td.learn-cell { width: 42px; }
    .stars span { font-size: 14px; }
    .learn-btn { padding: 2px 6px; font-size: 13px; }
    #modal { padding: 20px 14px 16px; border-radius: 10px; }
    #modal h2 { font-size: 20px; margin-bottom: 12px; }
    .mbox-blue, .mbox-green, .mbox-orange { font-size: 13px; padding: 8px 10px; }
    .mja { font-size: 13px; }
  }
</style>
</head>

<h1>スペイン語不規則活用動詞 — 現在形</h1>
<div class="legend">
  <div class="legend-item"><div class="swatch bg-gray"></div>規則活用と異なる活用形</div>
  <div class="legend-item"><div class="swatch bg-yellow"></div>新規追加（規則活用部分）</div>

</div>

  <button id="resetBtn">↩ 元の順序</button>

  <button id="filterBtn">💡 追加語彙のみ（OFF</button>
  <button id="filterLearnedBtn">✓ 未習得のみ（OFF</button>
  <span id="progress"></span>
</div>

<div id="overlay">
  <div id="modal">
    <button id="modal-close">✕</button>
    <h2 id="m-verb"></h2>
    <div class="msec">
      <div class="mlabel">例文（現在形）</div>
      <div class="mbox-blue" id="m-sent"></div>
    </div>
    <div class="msec">
      <div class="mlabel">日本語訳</div>
      <div class="mja" id="m-ja"></div>
    </div>
    <div class="msec">
      <div class="mlabel">解説</div>
      <div class="mnote" id="m-note"></div>
    </div>
    <div class="msec" id="m-idiom-sec" style="display:none">
      <div class="mlabel">📌 熟語・重要表現</div>
      <div class="mbox-orange" id="m-idiom"></div>
    </div>
    <div class="msec">
      <div class="mlabel">🌍 英語・語源トリビア</div>
      <div class="mbox-green" id="m-trivia"></div>
    </div>
  </div>
</div>

</table>
</div>

      {e:"cueste lo que cueste", j:"何があっても・どんな犠牲を払っても"},
      {e:"costar un ojo de la cara", j:"目が飛び出るほど高い"}
    ],
    t:"英語のcostとほぼ同じ。ラテン語constare（con-共に＋stare立つ）より。「価格として成立する」が原義。"
  },
  morir:{
    s:"Las plantas mueren sin agua.",
    j:"植物は水がないと枯れます。",
    n:"ellos形mueren（o→ue）。一般的事実の現在形。",
    i:[
      {e:"morirse de risa", j:"笑い死にしそう（とても笑う）"},
      {e:"morirse de hambre / sed", j:"お腹ペコペコ／喉がカラカラ"},
      {e:"morirse de vergüenza", j:"恥ずかしくて穴があったら入りたい"},
      {e:"¡Me muero!", j:"最高！・たまらない！（感情表現）"}
    ],
    t:"ラテン語mori（死ぬ）より。英語のmortal・mortality・immortal（不死の）と同根。"
  },
  contribuir:{
    s:"Todos contribuimos al éxito del proyecto.",
    j:"私たちは皆そのプロジェクトの成功に貢献しています。",
    n:"nosotros形contribuimos（y挿入なし）。単数・3人称複数はy挿入（contribuyo/contribuyen）。",
    i:[
      {e:"contribuir a", j:"〜に貢献する・〜に寄与する"},
      {e:"contribuir con", j:"〜を提供する（Contribuye con 100 euros＝100ユーロを出す）"}
    ],
    t:"英語のcontributeとほぼ同じ。ラテン語contribuere（con-共に＋tribuere割り与える）より。tributeもattributeも同根。"
  },
  distribuir:{
    s:"La empresa distribuye productos en todo el país.",
    j:"この会社は全国に製品を配布しています。",
    n:"él形distribuye（y挿入）。ビジネス・フォーマルな文脈で多用。",
    i:[
      {e:"distribución de tareas", j:"仕事の分配・役割分担"}
    ],
    t:"英語のdistributeとほぼ同じ。ラテン語distribuere（dis-分散＋tribuere割り与える）より。district（分けられた地域）も同根。"
  },
  incluir:{
    s:"El precio incluye el desayuno.",
    j:"料金には朝食が含まれています。",
    n:"él形incluye（y挿入）。「〜コミコミ」のホテルの説明で頻出。",
    i:[
      {e:"todo incluido", j:"全込み・オールインクルーシブ（旅行パックでよく見る語）"},
      {e:"incluyendo a", j:"〜を含めて"}
    ],
    t:"英語のincludeとほぼ同じ。ラテン語includere（in-中に＋claudere閉じる）より。exclude・conclude・precludeも同根。「中に閉じ込める＝含める」。"
  },
  concluir:{
    s:"Concluyo que necesitamos más tiempo.",
    j:"もっと時間が必要という結論に至りました。",

    i:[
      {e:"en conclusión", j:"結論として・まとめると"},
      {e:"llegar a una conclusión", j:"結論に達する（concluirの名詞形conclusiónを使った表現）"}
    ],
    t:"英語のconcludeとほぼ同じ。ラテン語concludere（con-共に＋claudere閉じる）より。include・exclude・precludeも同根。"
  }
};

// 重要度★：ページ初期値として各動詞の s 値を使い、localStorage で上書き
var imp = {};
ROWS.forEach(function(r){ imp[r.v] = r.s; });
try {
  var savedImp = JSON.parse(localStorage.getItem('spVerbs_imp') || '{}');
  Object.keys(savedImp).forEach(function(k){ imp[k] = savedImp[k]; });
} catch(e){}

// 覚えたフラグ
var learned = {};
try {
  learned = JSON.parse(localStorage.getItem('spVerbs_learned') || '{}');
} catch(e){}

var order = ROWS.slice();
var sortOn = false;
var filterOn = false;
var filterLearned = false;

function saveImp() {
  try { localStorage.setItem('spVerbs_imp', JSON.stringify(imp)); } catch(e){}
}
function saveLearned() {
  try { localStorage.setItem('spVerbs_learned', JSON.stringify(learned)); } catch(e){}
}

function updateProgress() {
  var total = ROWS.length;
  var done = ROWS.filter(function(r){ return learned[r.v]; }).length;
  document.getElementById('progress').textContent = '覚えた：' + done + ' / ' + total;
}

function bgClass(t) {
  if (t === "g") return "bg-gray";
  if (t === "y") return "bg-yellow";
  return "bg-white";
}

function starsHTML(verb) {
  var val = imp[verb] || 0;
  var s = '<div class="stars">';
  for (var i = 1; i <= 5; i++) {
    s += '<span class="' + (i <= val ? 'on' : '') + '" data-verb="' + verb + '" data-val="' + i + '">★</span>';
  }
  return s + '</div>';
}

function learnedCell(verb) {
  var on = learned[verb] ? ' on' : '';
  return '<td class="learn-cell"><button class="learn-btn' + on + '" data-learn="' + verb + '">✓</button></td>';
}

function render(arr) {
  document.getElementById('tbody').innerHTML = arr.map(function(row) {
    var rowCls = learned[row.v] ? ' class="row-learned"' : '';
    return '<tr' + rowCls + '>' + learnedCell(row.v) + '<td class="imp">' + starsHTML(row.v) + '</td>' +
      row.d.map(function(cell, i) {
        var cls = bgClass(cell[1]) + (i === 1 ? ' verb-cell' : '');
        var attr = i === 1 ? ' data-verb="' + row.v + '"' : '';
        return '<td class="' + cls + '"' + attr + '>' + cell[0] + '</td>';
      }).join('') + '</tr>';
  }).join('');
}

function display() {
  var arr = order.slice();
  if (filterOn) arr = arr.filter(function(r){ return r.d[0][1] === "y"; });
  if (filterLearned) arr = arr.filter(function(r){ return !learned[r.v]; });
  if (sortOn) arr.sort(function(a,b){ return (imp[b.v]||0) - (imp[a.v]||0); });
  render(arr);
  updateProgress();
}

document.getElementById('tbody').addEventListener('click', function(e) {
  // 覚えたボタン
  var btn = e.target.closest('button[data-learn]');
  if (btn) {
    var verb = btn.dataset.learn;
    learned[verb] = !learned[verb];
    saveLearned();
    display();
    return;
  }
  // 重要度★
  var span = e.target.closest('span[data-verb]');
  if (span) {
    var verb = span.dataset.verb;
    var val = parseInt(span.dataset.val);
    imp[verb] = (imp[verb] === val) ? 0 : val;
    saveImp();
    display();
    return;
  }
  // モーダル
  var cell = e.target.closest('td.verb-cell');
  if (!cell) return;
  var verb = cell.dataset.verb;
  var ex = EX[verb];
  if (!ex) return;
  document.getElementById('m-verb').textContent = verb;
  document.getElementById('m-sent').textContent = ex.s;
  document.getElementById('m-ja').textContent = ex.j;
  document.getElementById('m-note').textContent = ex.n;
  document.getElementById('m-trivia').textContent = ex.t;
  var idiomSec = document.getElementById('m-idiom-sec');
  var idiomDiv = document.getElementById('m-idiom');
  if (ex.i && ex.i.length > 0) {
    idiomDiv.innerHTML = ex.i.map(function(item) {
      return '<div class="idiom-row"><span class="idiom-es">' + item.e + '</span> <span class="idiom-ja">→ ' + item.j + '</span></div>';
    }).join('');
    idiomSec.style.display = '';
  } else {
    idiomSec.style.display = 'none';
  }
  document.getElementById('overlay').classList.add('show');
});

function closeModal() { document.getElementById('overlay').classList.remove('show'); }
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', function(e) { if (e.target===this) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key==='Escape') closeModal(); });

document.getElementById('shuffleBtn').addEventListener('click', function() {
  var a = ROWS.slice();
  for (var i = a.length-1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  order = a; display();
});
document.getElementById('resetBtn').addEventListener('click', function() { order = ROWS.slice(); display(); });
document.getElementById('sortBtn').addEventListener('click', function() {
  sortOn = !sortOn;
  this.classList.toggle('on', sortOn);
  this.textContent = '⭐ 重要度順（' + (sortOn ? 'ON' : 'OFF');
  display();
});
document.getElementById('filterBtn').addEventListener('click', function() {
  filterOn = !filterOn;
  this.classList.toggle('on', filterOn);
  this.textContent = '💡 追加語彙のみ（' + (filterOn ? 'ON' : 'OFF');
  display();
});
document.getElementById('filterLearnedBtn').addEventListener('click', function() {
  filterLearned = !filterLearned;
  this.classList.toggle('on', filterLearned);
  this.textContent = '✓ 未習得のみ（' + (filterLearned ? 'ON' : 'OFF');
  display();
});

display();
</script>
</body>
</html>
