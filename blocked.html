<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>閲覧できません — スペイン語学習ポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f5f5f0;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .box {
    text-align: center; max-width: 400px; width: 100%;
    background: #fff; border-radius: 10px; padding: 48px 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,.1);
  }
  .icon { font-size: 52px; margin-bottom: 20px; }
  h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px; color: #2a5298; margin-bottom: 12px;
  }
  p { font-size: 13px; color: #8e8e93; line-height: 1.8; }
  .home-link {
    display: inline-block; margin-top: 28px;
    font-size: 13px; color: #2a5298; text-decoration: none;
    border: 1px solid #2a5298; border-radius: 4px; padding: 8px 22px;
    transition: background .15s;
  }
  .home-link:hover { background: #ebeff8; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔒</div>
  <h1 id="msg">現在閲覧できません</h1>
  <p>このページは現在ご利用いただけません。</p>
  <p style="margin-top:6px">ご不明な点はサイト管理者にお問い合わせください。</p>
  <a href="index.html" class="home-link">← ホームへ戻る</a>
  <div style="margin-top:16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
    <a href="index.html?adminlogin=1"
       style="font-size:12px; color:#8e8e93; text-decoration:none; border:1px solid #d6d6ce; border-radius:4px; padding:7px 18px;">管理者ログイン</a>
    <a href="https://forms.gle/SG7Gsc9PVzzZ5LLW6" target="_blank"
       style="font-size:12px; color:#8e8e93; text-decoration:none; border:1px solid #d6d6ce; border-radius:4px; padding:7px 18px;">お問い合わせ</a>
  </div>
</div>
<script>
var reason = new URLSearchParams(window.location.search).get('reason');
document.getElementById('msg').textContent =
  reason === 'page' ? 'このページは現在閲覧できません' : 'このサイトは現在閲覧できません';
</script>
</body>
</html>
