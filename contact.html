<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ — スペイン語学習ポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2c2c2e; --mid: #555; --muted: #999;
    --accent: #2a5298; --bg: #f5f5f0; --surface: #fff;
    --rule: #ddd; --sans: 'Noto Sans JP', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans); font-size: 12px; line-height: 1.7;
    color: var(--ink); background: var(--bg);
    max-width: 680px; margin: 0 auto; padding: 32px 20px 80px;
  }
  header {
    border-top: 2px solid var(--accent); border-bottom: 1px solid var(--rule);
    padding: 18px 0 14px; margin-bottom: 28px;
  }
  header h1 { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 3px; }
  header p { font-size: 10px; color: var(--muted); }
  .notice-box {
    background: #fff8e1; border: 1px solid #ffe082; border-radius: 6px;
    padding: 14px 18px; margin-bottom: 28px; font-size: 11.5px; color: #7a6200;
  }
  .notice-box strong { display: block; font-size: 13px; margin-bottom: 4px; }
  .card {
    background: var(--surface); border: 1px solid var(--rule);
    border-radius: 8px; padding: 24px 28px; margin-bottom: 20px;
  }
  .card h2 { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; color: var(--mid); margin-bottom: 4px; }
  .field input, .field textarea, .field select {
    width: 100%; border: 1px solid #ccc; border-radius: 5px;
    padding: 8px 10px; font-family: var(--sans); font-size: 12px;
    color: var(--ink); background: #fafafa;
    pointer-events: none; opacity: 0.7;
  }
  .field textarea { height: 100px; resize: none; }
  .submit-btn {
    display: block; width: 100%; padding: 11px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 6px; font-size: 13px; font-family: var(--sans);
    cursor: not-allowed; opacity: 0.55; margin-top: 4px;
  }
  .back-link {
    display: inline-block; margin-top: 24px; font-size: 11px;
    color: var(--muted); text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }
  footer { margin-top: 60px; font-size: 10px; color: var(--muted); text-align: center; }
</style>
</head>
<body>

<header>
  <h1>お問い合わせ</h1>
  <p>スペイン語学習ポータル</p>
</header>

<div class="notice-box">
  <strong>⚠️ 現在調整中です</strong>
  お問い合わせフォームは現在準備中のため、送信できません。<br>
  ご不便をおかけして申し訳ありません。しばらくお待ちください。
</div>

<div class="card">
  <h2>お問い合わせフォーム</h2>
  <div class="field">
    <label>お名前</label>
    <input type="text" placeholder="山田 太郎" disabled>
  </div>
  <div class="field">
    <label>メールアドレス</label>
    <input type="email" placeholder="example@email.com" disabled>
  </div>
  <div class="field">
    <label>お問い合わせ種別</label>
    <select disabled>
      <option>内容の誤りについて</option>
      <option>ページが表示されない</option>
      <option>その他</option>
    </select>
  </div>
  <div class="field">
    <label>お問い合わせ内容</label>
    <textarea placeholder="ご自由にお書きください" disabled></textarea>
  </div>
  <button class="submit-btn" disabled>送信する（現在利用不可）</button>
</div>

<a href="index.html" class="back-link">← ホームへ戻る</a>

<footer>スペイン語 一列・二列 解説 — 2026年度</footer>

</body>
</html>
