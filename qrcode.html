<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a365d">
  <title>QRコード — スペイン語学習ポータル</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: #1c1c1e;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 48px 40px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      max-width: 380px;
      width: 100%;
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      color: #2a5298;
      letter-spacing: .04em;
    }
    .subtitle {
      font-size: 12px;
      color: #8e8e93;
      text-align: center;
      line-height: 1.7;
    }
    .qr-img {
      width: 220px;
      height: 220px;
      border: 1px solid #e5e5ea;
      border-radius: 8px;
      object-fit: contain;
      padding: 8px;
      background: #fff;
    }
    .back-link {
      font-size: 12px;
      color: #aaa;
      text-decoration: none;
    }
    .back-link:hover { color: #2a5298; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">スペイン語学習ポータル</div>
    <img src="qrcode_202606041851.png" alt="スペイン語学習ポータル QRコード" class="qr-img">
    <div class="subtitle">
      このQRコードをスキャンすると<br>スペイン語学習ポータルにアクセスできます
    </div>
    <a href="index.html" class="back-link">← トップに戻る</a>
  </div>
</body>
</html>
